  // --- Save/Load Game ---
  function serializeGameState() {
    return {
      seed: WORLD_SEED,
      mode: gameMode,
      playerX: player.x,
      playerY: player.y,
      playerHP: playerHP,
      hungerPoints: hungerPoints,
      armorSlot: armorSlot,
      armorHP: armorHP,
      goldArmorHP: goldArmorHP,
      diamondArmorHP: diamondArmorHP,
      inventory: [...inventory],
      hotbar: [...hotbar],
      dayTimer: dayTimer,
      craftingTables: craftingTables.map(c => ({ x: c.x, y: c.y })),
      furnaces: furnaces.map(f => ({ x: f.x, y: f.y })),
      planks: planks.map(p => ({ x: p.x, y: p.y })),
      stoneBricks: stoneBricks.map(s => ({ x: s.x, y: s.y })),
      chests: chests.map(c => ({ x: c.x, y: c.y, items: [...c.items] })),
      anvils: anvils.map(a => ({ x: a.x, y: a.y })),
      respawners: respawners.map(r => ({ x: r.x, y: r.y })),
      portals: portals.map(p => ({ x: p.x, y: p.y, activated: p.activated })),
      lastRespawner: lastRespawner ? { x: lastRespawner.x, y: lastRespawner.y } : null,
      mineshafts: mineshafts.map(ms => ({ x: ms.x, y: ms.y, bridgeSlots: [...ms.bridgeSlots], bridgeFixed: ms.bridgeFixed })),
    };
  }

  function saveCurrentGame() {
    if (currentWorldSlot < 0 || currentWorldSlot > 4) return;
    const worlds = getWorlds();
    const data = serializeGameState();
    data.name = worlds[currentWorldSlot] ? worlds[currentWorldSlot].name : 'World';
    worlds[currentWorldSlot] = data;
    saveWorlds(worlds);
    saveMessageTimer = 2.0;
  }

  function resetGameState(seed) {
    WORLD_SEED = seed;
    // Clear chunks and regeneration data
    chunks.clear();
    lastPlayerChunkX = null;
    lastPlayerChunkY = null;
    generatedMineshaftChunks.clear();
    mineshafts.length = 0;

    // Reset player
    _spawnSet = false;
    const sp = findForestSpawn();
    _spawnSet = true;
    spawnPos.x = sp.x;
    spawnPos.y = sp.y;
    player.x = sp.x;
    player.y = sp.y;
    playerHP = MAX_HP;
    playerDead = false;
    gamePaused = false;
    gameWon = false;
    lavaTimer = 0;
    hungerPoints = MAX_HUNGER;
    hungerTimer = 0;
    hungerMsgTimer = 0;
    starveMsgTimer = 0;
    hungerHealTimer = 0;
    starveTimer = 0;
    armorSlot = null;
    armorHP = 0;
    goldArmorHP = 0;
    diamondArmorHP = 0;

    // Clear inventory
    inventory.fill(null);
    hotbar.fill(null);

    // Clear placed objects
    craftingTables.length = 0;
    craftingTables.push({ x: sp.x + 14, y: sp.y + 8 });
    furnaces.length = 0;
    planks.length = 0;
    stoneBricks.length = 0;
    chests.length = 0;
    anvils.length = 0;
    respawners.length = 0;
    portals.length = 0;
    lastRespawner = null;

    // Clear enemies
    golems.length = 0;
    stoneGolems.length = 0;
    ironGolems.length = 0;
    goldGolems.length = 0;
    diamondGolems.length = 0;
    obsidianGolems.length = 0;

    // Close UIs
    inventoryOpen = false;
    craftingOpen = false;
    bridgeOpen = false;
    furnaceOpen = false;
    chestOpen = false;
    anvilOpen = false;
    activeShaft = null;
    activeFurnace = null;
    activeChest = null;
    activeAnvil = null;

    dayTimer = 0;
    nightSpawnTimer = 0;
    nightMessageTimer = 0;
    dayMessageTimer = 0;
    wasNight = false;
    shaftTransitionPhase = 'none';

    // Rebuild chunks
    updateChunks();
  }

  function loadGameState(data) {
    WORLD_SEED = data.seed;
    gameMode = data.mode || 'normal';

    // Clear chunks
    chunks.clear();
    lastPlayerChunkX = null;
    lastPlayerChunkY = null;
    generatedMineshaftChunks.clear();
    mineshafts.length = 0;

    // Restore mineshafts
    if (data.mineshafts) {
      for (const ms of data.mineshafts) {
        mineshafts.push({ x: ms.x, y: ms.y, bridgeSlots: [...ms.bridgeSlots], bridgeFixed: ms.bridgeFixed });
      }
    } else {
      mineshafts.push({ x: -30, y: -60, bridgeSlots: new Array(5).fill(null), bridgeFixed: true });
    }

    // Set spawn pos for biome generation
    _spawnSet = false;
    const sp = findForestSpawn();
    _spawnSet = true;
    spawnPos.x = sp.x;
    spawnPos.y = sp.y;

    // Restore player
    player.x = data.playerX;
    player.y = data.playerY;
    playerHP = data.playerHP;
    hungerPoints = data.hungerPoints;
    armorSlot = data.armorSlot;
    armorHP = data.armorHP;
    goldArmorHP = data.goldArmorHP;
    diamondArmorHP = data.diamondArmorHP;
    playerDead = false;
    gamePaused = false;
    gameWon = false;
    lavaTimer = 0;
    hungerTimer = 0;
    hungerMsgTimer = 0;
    starveMsgTimer = 0;
    hungerHealTimer = 0;
    starveTimer = 0;

    // Restore inventory
    for (let i = 0; i < 25; i++) inventory[i] = data.inventory[i] || null;
    for (let i = 0; i < 5; i++) hotbar[i] = data.hotbar[i] || null;

    dayTimer = data.dayTimer || 0;
    nightSpawnTimer = 0;
    nightMessageTimer = 0;
    dayMessageTimer = 0;
    wasNight = false;
    shaftTransitionPhase = 'none';

    // Restore placed objects
    craftingTables.length = 0;
    for (const c of (data.craftingTables || [])) craftingTables.push({ x: c.x, y: c.y });
    furnaces.length = 0;
    for (const f of (data.furnaces || [])) furnaces.push({ x: f.x, y: f.y, lastUsed: 0 });
    planks.length = 0;
    for (const p of (data.planks || [])) planks.push({ x: p.x, y: p.y });
    stoneBricks.length = 0;
    for (const s of (data.stoneBricks || [])) stoneBricks.push({ x: s.x, y: s.y });
    chests.length = 0;
    for (const c of (data.chests || [])) chests.push({ x: c.x, y: c.y, items: [...c.items] });
    anvils.length = 0;
    for (const a of (data.anvils || [])) anvils.push({ x: a.x, y: a.y });
    respawners.length = 0;
    for (const r of (data.respawners || [])) respawners.push({ x: r.x, y: r.y });
    portals.length = 0;
    for (const p of (data.portals || [])) portals.push({ x: p.x, y: p.y, activated: p.activated });
    lastRespawner = data.lastRespawner ? { x: data.lastRespawner.x, y: data.lastRespawner.y } : null;

    // Clear enemies
    golems.length = 0;
    stoneGolems.length = 0;
    ironGolems.length = 0;
    goldGolems.length = 0;
    diamondGolems.length = 0;
    obsidianGolems.length = 0;

    // Close UIs
    inventoryOpen = false;
    craftingOpen = false;
    bridgeOpen = false;
    furnaceOpen = false;
    chestOpen = false;
    anvilOpen = false;
    activeShaft = null;
    activeFurnace = null;
    activeChest = null;
    activeAnvil = null;

    // Rebuild chunks
    updateChunks();
  }

  function startNewGame(seed, mode, slotIndex, name) {
    try {
      console.log('Starting new game, seed:', seed, 'mode:', mode);
      resetGameState(seed);
      console.log('Reset complete, player at:', player.x, player.y);
      gameMode = mode;
      currentWorldSlot = slotIndex;

      // Save initial state
      const worlds = getWorlds();
      const data = serializeGameState();
      data.name = name;
      worlds[slotIndex] = data;
      saveWorlds(worlds);
      console.log('Game saved, switching to playing');
      gameState = 'playing';
    } catch(err) {
      console.error('startNewGame failed:', err);
      gameState = 'title';
    }
  }

  function startLoadedGame(slotIndex) {
    try {
      const worlds = getWorlds();
      const data = worlds[slotIndex];
      if (!data) return;
      console.log('Loading game from slot', slotIndex);
      currentWorldSlot = slotIndex;
      loadGameState(data);
      console.log('Load complete, switching to playing');
      gameState = 'playing';
    } catch(err) {
      console.error('startLoadedGame failed:', err);
      gameState = 'title';
    }
  }

  function deleteWorld(slotIndex) {
    const worlds = getWorlds();
    worlds[slotIndex] = null;
    saveWorlds(worlds);
  }

  function returnToTitle() {
    gameState = 'title';
    currentWorldSlot = -1;
    worldNameInput = '';
    selectedMode = 'normal';
  }

  let mouseCanvasX = -1, mouseCanvasY = -1;
  let dragItem = null;
  let dragFrom = -1;

  function updateMouseFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    mouseCanvasX = (e.clientX - rect.left) * (W / rect.width);
    mouseCanvasY = (e.clientY - rect.top) * (H / rect.height);
  }

  canvas.addEventListener('mousemove', updateMouseFromEvent);
  canvas.addEventListener('mouseleave', () => {
    if (dragItem === null) { mouseCanvasX = -1; mouseCanvasY = -1; }
  });

  function slotAtMouse() {
    const hby = HOTBAR_Y + INV_BORDER;
    if (mouseCanvasY >= hby && mouseCanvasY < hby + INV_CELL) {
      for (let col = 0; col < 5; col++) {
        const x = HOTBAR_X + INV_BORDER + col * (INV_CELL + INV_BORDER);
        if (mouseCanvasX >= x && mouseCanvasX < x + INV_CELL) return 25 + col;
      }
    }
    if (inventoryOpen || craftingOpen || bridgeOpen || furnaceOpen || chestOpen || anvilOpen) {
      const bx = (craftingOpen || bridgeOpen || furnaceOpen || chestOpen || anvilOpen) ? CRAFT_INV_X : INV_X;
      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 5; col++) {
          const x = bx + INV_BORDER + col * (INV_CELL + INV_BORDER);
          const y = INV_Y + INV_BORDER + row * (INV_CELL + INV_BORDER);
          if (mouseCanvasX >= x && mouseCanvasX < x + INV_CELL &&
              mouseCanvasY >= y && mouseCanvasY < y + INV_CELL) {
            return row * 5 + col;
          }
        }
      }
    }
    if (bridgeOpen) {
      for (let i = 0; i < 5; i++) {
        const x = BRIDGE_SLOT_X;
        const y = BRIDGE_SLOT_Y0 + i * (INV_CELL + INV_BORDER);
        if (mouseCanvasX >= x && mouseCanvasX < x + INV_CELL &&
            mouseCanvasY >= y && mouseCanvasY < y + INV_CELL) {
          return 30 + i;
        }
      }
    }
    if (chestOpen) {
      for (let i = 0; i < 25; i++) {
        const pos = chestSlotPos(i);
        if (mouseCanvasX >= pos.x && mouseCanvasX < pos.x + CHEST_CELL &&
            mouseCanvasY >= pos.y && mouseCanvasY < pos.y + CHEST_CELL) {
          return 35 + i;
        }
      }
    }
    if (inventoryOpen && !craftingOpen && !bridgeOpen && !furnaceOpen && !chestOpen && !anvilOpen) {
      if (mouseCanvasX >= ARMOR_SLOT_X && mouseCanvasX < ARMOR_SLOT_X + INV_CELL &&
          mouseCanvasY >= ARMOR_SLOT_Y && mouseCanvasY < ARMOR_SLOT_Y + INV_CELL) {
        return 60;
      }
    }
    return -1;
  }

  canvas.addEventListener('mousedown', e => {
    if (gameState !== 'playing') return;
    if (e.button !== 0 || shaftTransitionPhase !== 'none') return;
    updateMouseFromEvent(e);
    if (dragItem !== null) return;
    const slot = slotAtMouse();
    if (slot >= 0) {
      const item = getSlotItem(slot);
      if (item) {
        dragItem = item;
        dragFrom = slot;
        setSlotItem(slot, null);
      }
    }
  });

  window.addEventListener('mouseup', e => {
    if (e.button !== 0) return;
    if (dragItem === null) return;
    updateMouseFromEvent(e);
    const target = slotAtMouse();
    if (target < 0 || target === dragFrom) {
      if (target < 0 && dragItem === 'workbench' && !inventoryOpen && !craftingOpen && !bridgeOpen && !furnaceOpen && !anvilOpen && !playerDead) {
        const wx = mouseCanvasX + camX - CRAFTING_TABLE_W / 2;
        const wy = mouseCanvasY + camY - CRAFTING_TABLE_H / 2;
        craftingTables.push({ x: Math.round(wx), y: Math.round(wy) });
      } else if (target < 0 && dragItem === 'furnace' && !inventoryOpen && !craftingOpen && !bridgeOpen && !furnaceOpen && !anvilOpen && !playerDead) {
        const wx = mouseCanvasX + camX - FURNACE_W / 2;
        const wy = mouseCanvasY + camY - FURNACE_H / 2;
        furnaces.push({ x: Math.round(wx), y: Math.round(wy), lastUsed: 0 });
      } else if (target < 0 && dragItem === 'plank' && !inventoryOpen && !craftingOpen && !bridgeOpen && !furnaceOpen && !chestOpen && !anvilOpen && !playerDead) {
        const wx = mouseCanvasX + camX - PLANK_W / 2;
        const wy = mouseCanvasY + camY - PLANK_H / 2;
        planks.push({ x: Math.round(wx), y: Math.round(wy) });
      } else if (target < 0 && dragItem === 'stone_brick' && !inventoryOpen && !craftingOpen && !bridgeOpen && !furnaceOpen && !chestOpen && !anvilOpen && !playerDead) {
        const wx = mouseCanvasX + camX - STONE_BRICK_W / 2;
        const wy = mouseCanvasY + camY - STONE_BRICK_H / 2;
        stoneBricks.push({ x: Math.round(wx), y: Math.round(wy) });
      } else if (target < 0 && dragItem === 'chest' && !inventoryOpen && !craftingOpen && !bridgeOpen && !furnaceOpen && !chestOpen && !anvilOpen && !playerDead) {
        const wx = mouseCanvasX + camX - CHEST_W / 2;
        const wy = mouseCanvasY + camY - CHEST_H / 2;
        chests.push({ x: Math.round(wx), y: Math.round(wy), items: new Array(25).fill(null) });
      } else if (target < 0 && dragItem === 'anvil' && !inventoryOpen && !craftingOpen && !bridgeOpen && !furnaceOpen && !chestOpen && !anvilOpen && !playerDead) {
        const wx = mouseCanvasX + camX - ANVIL_W / 2;
        const wy = mouseCanvasY + camY - ANVIL_H / 2;
        anvils.push({ x: Math.round(wx), y: Math.round(wy) });
      } else if (target < 0 && dragItem === 'respawner' && !inventoryOpen && !craftingOpen && !bridgeOpen && !furnaceOpen && !chestOpen && !anvilOpen && !playerDead) {
        const wx = mouseCanvasX + camX - RESPAWNER_W / 2;
        const wy = mouseCanvasY + camY - RESPAWNER_H / 2;
        const rsx = Math.round(wx);
        const rsy = Math.round(wy);
        respawners.push({ x: rsx, y: rsy });
        lastRespawner = { x: rsx, y: rsy };
      } else if (target < 0 && dragItem === 'obsidian_portal' && !inventoryOpen && !craftingOpen && !bridgeOpen && !furnaceOpen && !chestOpen && !anvilOpen && !playerDead && !gameWon) {
        const wx = mouseCanvasX + camX - OBSIDIAN_PORTAL_W / 2;
        const wy = mouseCanvasY + camY - OBSIDIAN_PORTAL_H / 2;
        portals.push({ x: Math.round(wx), y: Math.round(wy), activated: false });
      } else {
        setSlotItem(dragFrom, dragItem);
      }
    } else {
      // Armor slot only accepts iron_armor, gold_armor, or diamond_armor
      if (target === 60 && dragItem !== 'iron_armor' && dragItem !== 'gold_armor' && dragItem !== 'diamond_armor') {
        setSlotItem(dragFrom, dragItem);
      } else if (target === 60 && (dragItem === 'iron_armor' || dragItem === 'gold_armor' || dragItem === 'diamond_armor')) {
        const existing = getSlotItem(target);
        setSlotItem(target, dragItem);
        setSlotItem(dragFrom, existing);
      } else if (dragFrom === 60 && target !== 60) {
        const existing = getSlotItem(target);
        setSlotItem(target, dragItem);
        setSlotItem(dragFrom, existing);
      // Bridge slots only accept iron bars
      } else if (target >= 30 && target <= 34 && dragItem !== 'iron_bar') {
        setSlotItem(dragFrom, dragItem);
      } else if (dragFrom >= 30 && dragFrom <= 34 && target >= 30 && target <= 34) {
        // Swap within bridge slots
        const existing = getSlotItem(target);
        setSlotItem(target, dragItem);
        setSlotItem(dragFrom, existing);
      } else if (dragFrom >= 30 && dragFrom <= 34) {
        // Dragging out of bridge slot — only if target can hold iron bars
        const existing = getSlotItem(target);
        if (existing !== null && existing !== 'iron_bar') {
          setSlotItem(dragFrom, dragItem);
        } else {
          setSlotItem(target, dragItem);
          setSlotItem(dragFrom, existing);
        }
      } else {
        const existing = getSlotItem(target);
        setSlotItem(target, dragItem);
        setSlotItem(dragFrom, existing);
      }
    }
    dragItem = null;
    dragFrom = -1;
  });

  function drawItemAt(item, x, y) {
    if (item === 'log') drawLog(x, y + 3);
    else if (item === 'iron_ore') drawSprite(ORE_SPRITE, x + 2, y + 3, ORE_COLORS);
    else if (item === 'stone') drawSprite(STONE_SPRITE, x + 2, y + 3, STONE_COLORS);
    else if (item === 'wooden_pickaxe') drawSprite(PICKAXE_SPRITE, x + 2, y + 2, PICKAXE_COLORS);
    else if (item === 'stone_pickaxe') drawSprite(STONE_PICKAXE_SPRITE, x + 2, y + 2, STONE_PICKAXE_COLORS);
    else if (item === 'workbench') drawSprite(WORKBENCH_INV_SPRITE, x + 2, y + 2, WORKBENCH_INV_COLORS);
    else if (item === 'apple') drawSprite(APPLE_SPRITE, x + 2, y + 2, APPLE_COLORS);
    else if (item === 'furnace') drawSprite(FURNACE_INV_SPRITE, x + 2, y + 2, FURNACE_INV_COLORS);
    else if (item === 'coal') drawSprite(COAL_SPRITE, x + 2, y + 3, COAL_COLORS);
    else if (item === 'iron_bar') drawSprite(IRON_BAR_SPRITE, x + 2, y + 3, IRON_BAR_COLORS);
    else if (item === 'plank') drawSprite(PLANK_INV_SPRITE, x + 2, y + 2, PLANK_INV_COLORS);
    else if (item === 'iron_pickaxe') drawSprite(IRON_PICKAXE_SPRITE, x + 2, y + 2, IRON_PICKAXE_COLORS);
    else if (item === 'chest') drawSprite(CHEST_INV_SPRITE, x + 2, y + 2, CHEST_INV_COLORS);
    else if (item === 'wooden_sword') drawSprite(WOODEN_SWORD_SPRITE, x + 2, y + 2, WOODEN_SWORD_COLORS);
    else if (item === 'stone_sword') drawSprite(STONE_SWORD_SPRITE, x + 2, y + 2, STONE_SWORD_COLORS);
    else if (item === 'iron_sword') drawSprite(IRON_SWORD_SPRITE, x + 2, y + 2, IRON_SWORD_COLORS);
    else if (item === 'raw_meat') drawSprite(RAW_MEAT_SPRITE, x + 2, y + 3, RAW_MEAT_COLORS);
    else if (item === 'cooked_meat') drawSprite(COOKED_MEAT_SPRITE, x + 2, y + 3, COOKED_MEAT_COLORS);
    else if (item === 'iron_armor') drawSprite(IRON_ARMOR_SPRITE, x + 2, y + 2, IRON_ARMOR_COLORS);
    else if (item === 'anvil') drawSprite(ANVIL_INV_SPRITE, x + 2, y + 2, ANVIL_INV_COLORS);
    else if (item === 'gold_ore') drawSprite(GOLD_ORE_SPRITE, x + 2, y + 3, GOLD_ORE_COLORS);
    else if (item === 'gold_bar') drawSprite(GOLD_BAR_SPRITE, x + 2, y + 3, GOLD_BAR_COLORS);
    else if (item === 'gold_sword') drawSprite(GOLD_SWORD_SPRITE, x + 2, y + 2, GOLD_SWORD_COLORS);
    else if (item === 'gold_pickaxe') drawSprite(GOLD_PICKAXE_SPRITE, x + 2, y + 2, GOLD_PICKAXE_COLORS);
    else if (item === 'gold_armor') drawSprite(GOLD_ARMOR_SPRITE, x + 2, y + 2, GOLD_ARMOR_COLORS);
    else if (item === 'golden_apple') drawSprite(GOLDEN_APPLE_SPRITE, x + 2, y + 2, GOLDEN_APPLE_COLORS);
    else if (item === 'diamond_ore') drawSprite(DIAMOND_ORE_SPRITE, x + 2, y + 3, DIAMOND_ORE_COLORS);
    else if (item === 'diamond') drawSprite(DIAMOND_SPRITE, x + 2, y + 3, DIAMOND_COLORS);
    else if (item === 'diamond_pickaxe') drawSprite(DIAMOND_PICKAXE_SPRITE, x + 2, y + 2, DIAMOND_PICKAXE_COLORS);
    else if (item === 'diamond_sword') drawSprite(DIAMOND_SWORD_SPRITE, x + 2, y + 2, DIAMOND_SWORD_COLORS);
    else if (item === 'diamond_armor') drawSprite(DIAMOND_ARMOR_SPRITE, x + 2, y + 2, DIAMOND_ARMOR_COLORS);
    else if (item === 'respawner') drawSprite(RESPAWNER_INV_SPRITE, x + 2, y + 2, RESPAWNER_INV_COLORS);
    else if (item === 'obsidian_ore') drawSprite(OBSIDIAN_ORE_SPRITE, x + 2, y + 3, OBSIDIAN_ORE_COLORS);
    else if (item === 'obsidian') drawSprite(OBSIDIAN_SPRITE, x + 2, y + 3, OBSIDIAN_COLORS);
    else if (item === 'obsidian_heart') drawSprite(OBSIDIAN_HEART_SPRITE, x + 2, y + 3, OBSIDIAN_HEART_COLORS);
    else if (item === 'obsidian_portal') drawSprite(OBSIDIAN_PORTAL_INV_SPRITE, x + 1, y + 1, OBSIDIAN_PORTAL_INV_COLORS);
    else if (item === 'stone_brick') drawSprite(STONE_BRICK_INV_SPRITE, x + 2, y + 2, STONE_BRICK_INV_COLORS);
  }

  function drawDragGhost() {
    if (dragItem === null) return;
    const x = Math.round(mouseCanvasX - INV_CELL / 2);
    const y = Math.round(mouseCanvasY - INV_CELL / 2);
    drawItemAt(dragItem, x, y);
  }

  function hoveredSlotAt(bx) {
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        const x = bx + INV_BORDER + col * (INV_CELL + INV_BORDER);
        const y = INV_Y + INV_BORDER + row * (INV_CELL + INV_BORDER);
        if (mouseCanvasX >= x && mouseCanvasX < x + INV_CELL &&
            mouseCanvasY >= y && mouseCanvasY < y + INV_CELL) {
          return row * 5 + col;
        }
      }
    }
    const hby = HOTBAR_Y + INV_BORDER;
    if (mouseCanvasY >= hby && mouseCanvasY < hby + INV_CELL) {
      for (let col = 0; col < 5; col++) {
        const x = HOTBAR_X + INV_BORDER + col * (INV_CELL + INV_BORDER);
        if (mouseCanvasX >= x && mouseCanvasX < x + INV_CELL) return 25 + col;
      }
    }
    if (bridgeOpen) {
      for (let i = 0; i < 5; i++) {
        const x = BRIDGE_SLOT_X;
        const y = BRIDGE_SLOT_Y0 + i * (INV_CELL + INV_BORDER);
        if (mouseCanvasX >= x && mouseCanvasX < x + INV_CELL &&
            mouseCanvasY >= y && mouseCanvasY < y + INV_CELL) {
          return 30 + i;
        }
      }
    }
    if (chestOpen) {
      for (let i = 0; i < 25; i++) {
        const pos = chestSlotPos(i);
        if (mouseCanvasX >= pos.x && mouseCanvasX < pos.x + CHEST_CELL &&
            mouseCanvasY >= pos.y && mouseCanvasY < pos.y + CHEST_CELL) {
          return 35 + i;
        }
      }
    }
    if (inventoryOpen && !craftingOpen && !bridgeOpen && !furnaceOpen && !chestOpen && !anvilOpen) {
      if (mouseCanvasX >= ARMOR_SLOT_X && mouseCanvasX < ARMOR_SLOT_X + INV_CELL &&
          mouseCanvasY >= ARMOR_SLOT_Y && mouseCanvasY < ARMOR_SLOT_Y + INV_CELL) {
        return 60;
      }
    }
    return -1;
  }

  function drawInvBox(bx, y, text, width = INV_SIZE) {
    ctx.fillStyle = '#c8c8c8';
    ctx.fillRect(bx, y, width, INV_BOX_H);
    if (text) {
      drawText(text, bx + width / 2, y + INV_BOX_H / 2, '#222');
    }
  }

  function drawInvPanel(bx) {
    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 5; col++) {
        const x = bx + INV_BORDER + col * (INV_CELL + INV_BORDER);
        const y = INV_Y + INV_BORDER + row * (INV_CELL + INV_BORDER);
        ctx.fillStyle = '#c8c8c8';
        ctx.fillRect(x, y, INV_CELL, INV_CELL);
        const item = inventory[row * 5 + col];
        if (item) drawItemAt(item, x, y);
      }
    }
    drawInvBox(bx, UI_OY, 'Inventory');
    const slot = hoveredSlotAt(bx);
    const hoverItem = slot >= 0 ? getSlotItem(slot) : null;
    drawInvBox(bx, INV_FOOTER_Y, hoverItem ? ITEM_NAMES[hoverItem] : '');
  }

  // Ghost iron armor for empty armor slot
  const IRON_ARMOR_GHOST_COLORS = {
    I: '#9a9a9e',
    i: '#b0b0b4',
    L: '#bababc',
  };
  const GOLD_ARMOR_GHOST_COLORS = {
    G: '#9a9a9e',
    g: '#b0b0b4',
    Y: '#bababc',
  };

  function drawArmorSlot() {
    // Position armor slot to the right of whichever inventory panel is showing
    const asx = ARMOR_SLOT_X;
    const asy = ARMOR_SLOT_Y;
    ctx.fillStyle = '#c8c8c8';
    ctx.fillRect(asx, asy, INV_CELL, INV_CELL);
    if (armorSlot) {
      drawItemAt(armorSlot, asx, asy);
    } else {
      drawSprite(IRON_ARMOR_SPRITE, asx + 2, asy + 2, IRON_ARMOR_GHOST_COLORS);
    }
    // Label
    drawText('Armor', asx + INV_CELL / 2, asy + INV_CELL + 4, '#a0a0a8');
  }

  function drawInventory() {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#444';
    ctx.fillRect(UI_OX, UI_OY, UI_REF_W, UI_REF_H);
    drawInvPanel(INV_X);
    drawArmorSlot();
    // Craft Workbench button
    const cwBtnX = INV_X;
    const cwBtnY = INV_FOOTER_Y + INV_BOX_H + 2;
    const cwBtnW = INV_SIZE;
    const cwBtnH = 12;
    const canCraft = countItem('log') >= 2;
    ctx.fillStyle = canCraft ? '#5a5a64' : '#3a3a3e';
    ctx.fillRect(cwBtnX, cwBtnY, cwBtnW, cwBtnH);
    // Workbench icon on the left side of the button
    const cwHover = mouseCanvasX >= cwBtnX && mouseCanvasX < cwBtnX + cwBtnW &&
                    mouseCanvasY >= cwBtnY && mouseCanvasY < cwBtnY + cwBtnH;
    if (cwHover) {
      drawText('Requires: 2 Log', cwBtnX + cwBtnW / 2, cwBtnY + cwBtnH / 2, canCraft ? '#e8e8e8' : '#6a6a6e');
    } else {
      drawSprite(WORKBENCH_INV_SPRITE, cwBtnX + 1, cwBtnY + 1, canCraft ? WORKBENCH_INV_COLORS : LOG_GHOST_COLORS);
      drawText('Craft', cwBtnX + cwBtnW / 2 + 5, cwBtnY + cwBtnH / 2, canCraft ? '#e8e8e8' : '#6a6a6e');
    }
  }

  function drawHotbar() {
    ctx.fillStyle = '#444';
    ctx.fillRect(HOTBAR_X, HOTBAR_Y, HOTBAR_W, HOTBAR_H);
    for (let col = 0; col < 5; col++) {
      const x = HOTBAR_X + INV_BORDER + col * (INV_CELL + INV_BORDER);
      const y = HOTBAR_Y + INV_BORDER;
      ctx.fillStyle = '#c8c8c8';
      ctx.fillRect(x, y, INV_CELL, INV_CELL);
      const item = hotbar[col];
      if (item) drawItemAt(item, x, y);
    }
  }

  function drawHotbarLabel() {
    if (inventoryOpen || craftingOpen) return;
    const slot = slotAtMouse();
    if (slot < 25 || slot > 29) return;
    const item = hotbar[slot - 25];
    if (!item) return;
    drawInvBox(HOTBAR_X, HOTBAR_Y - INV_BOX_H, ITEM_NAMES[item] || '', HOTBAR_W);
  }

  let RECIPE_BAR_X = CRAFT_LEFT_X + 3;
  let RECIPE_BAR_W = CRAFT_LEFT_W - 6;
  const RECIPE_BAR_H = 14;
  const RECIPE_BAR_GAP = 2;
  let RECIPE_BARS_Y = INV_Y + 4;

  function drawCrafting() {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#444';
    ctx.fillRect(UI_OX, UI_OY, UI_REF_W, UI_REF_H);
    ctx.fillStyle = '#2a2a30';
    ctx.fillRect(CRAFT_LEFT_X, INV_Y, CRAFT_LEFT_W, INV_SIZE);
    drawInvBox(CRAFT_LEFT_X, UI_OY, 'Crafting', CRAFT_LEFT_W);
    // Draw 5 recipe bars
    for (let i = 0; i < 5; i++) {
      const by = RECIPE_BARS_Y + i * (RECIPE_BAR_H + RECIPE_BAR_GAP);
      ctx.fillStyle = '#c8c8c8';
      ctx.fillRect(RECIPE_BAR_X, by, RECIPE_BAR_W, RECIPE_BAR_H);
    }
    // Page indicator
    const pageText = (craftPage + 1) + '/5';
    drawText(pageText, CRAFT_LEFT_X + CRAFT_LEFT_W / 2, INV_Y + INV_SIZE - 4, '#a0a0a8');
    // Up arrow
    const arrowX = CRAFT_LEFT_X + Math.floor(CRAFT_LEFT_W / 2);
    const upArrowY = RECIPE_BARS_Y - 6;
    ctx.fillStyle = craftPage > 0 ? '#a0a0a8' : '#3a3a3e';
    ctx.beginPath();
    ctx.moveTo(arrowX, upArrowY - 2);
    ctx.lineTo(arrowX - 5, upArrowY + 3);
    ctx.lineTo(arrowX + 5, upArrowY + 3);
    ctx.closePath();
    ctx.fill();
    // Down arrow
    const downArrowY = RECIPE_BARS_Y + 5 * (RECIPE_BAR_H + RECIPE_BAR_GAP) - 2;
    ctx.fillStyle = craftPage < 4 ? '#a0a0a8' : '#3a3a3e';
    ctx.beginPath();
    ctx.moveTo(arrowX, downArrowY + 5);
    ctx.lineTo(arrowX - 5, downArrowY);
    ctx.lineTo(arrowX + 5, downArrowY);
    ctx.closePath();
    ctx.fill();
    // Draw recipes for current page
    if (craftPage === 0) {
      // Recipe 0: Wooden Pickaxe (4 log)
      if (countItem('log') >= 4) {
        const by = RECIPE_BARS_Y;
        const hovering = mouseCanvasX >= RECIPE_BAR_X &&
                         mouseCanvasX < RECIPE_BAR_X + RECIPE_BAR_W &&
                         mouseCanvasY >= by &&
                         mouseCanvasY < by + RECIPE_BAR_H;
        if (hovering) {
          drawText('Required:', RECIPE_BAR_X + RECIPE_BAR_W / 2, by + 4, '#222');
          drawText('4 Log', RECIPE_BAR_X + RECIPE_BAR_W / 2, by + 10, '#222');
        } else {
          drawSprite(PICKAXE_SPRITE, RECIPE_BAR_X + 2, by + 2, PICKAXE_COLORS);
        }
      }
      // Recipe 1: Stone Pickaxe (1 pick + 3 stone)
      if (countItem('wooden_pickaxe') >= 1 && countItem('stone') >= 3) {
        const by = RECIPE_BARS_Y + (RECIPE_BAR_H + RECIPE_BAR_GAP);
        const hovering = mouseCanvasX >= RECIPE_BAR_X &&
                         mouseCanvasX < RECIPE_BAR_X + RECIPE_BAR_W &&
                         mouseCanvasY >= by &&
                         mouseCanvasY < by + RECIPE_BAR_H;
        if (hovering) {
          drawText('Required:', RECIPE_BAR_X + RECIPE_BAR_W / 2, by + 4, '#222');
          drawText('1 Pick 3 Stone', RECIPE_BAR_X + RECIPE_BAR_W / 2, by + 10, '#222');
        } else {
          drawSprite(STONE_PICKAXE_SPRITE, RECIPE_BAR_X + 2, by + 2, STONE_PICKAXE_COLORS);
        }
      }
      // Recipe 2: Workbench (2 log)
      if (countItem('log') >= 2) {
        const by = RECIPE_BARS_Y + 2 * (RECIPE_BAR_H + RECIPE_BAR_GAP);
        const hovering = mouseCanvasX >= RECIPE_BAR_X &&
                         mouseCanvasX < RECIPE_BAR_X + RECIPE_BAR_W &&
                         mouseCanvasY >= by &&
                         mouseCanvasY < by + RECIPE_BAR_H;
        if (hovering) {
          drawText('Required:', RECIPE_BAR_X + RECIPE_BAR_W / 2, by + 4, '#222');
          drawText('2 Log', RECIPE_BAR_X + RECIPE_BAR_W / 2, by + 10, '#222');
        } else {
          drawSprite(WORKBENCH_INV_SPRITE, RECIPE_BAR_X + 2, by + 2, WORKBENCH_INV_COLORS);
        }
      }
      // Recipe 3: Apple (1 log)
      if (countItem('log') >= 1) {
        const by = RECIPE_BARS_Y + 3 * (RECIPE_BAR_H + RECIPE_BAR_GAP);
        const hovering = mouseCanvasX >= RECIPE_BAR_X &&
                         mouseCanvasX < RECIPE_BAR_X + RECIPE_BAR_W &&
                         mouseCanvasY >= by &&
                         mouseCanvasY < by + RECIPE_BAR_H;
        if (hovering) {
          drawText('Required:', RECIPE_BAR_X + RECIPE_BAR_W / 2, by + 4, '#222');
          drawText('1 Log', RECIPE_BAR_X + RECIPE_BAR_W / 2, by + 10, '#222');
        } else {
          drawSprite(APPLE_SPRITE, RECIPE_BAR_X + 2, by + 2, APPLE_COLORS);
        }
      }
      // Recipe 4: Furnace (2 stone)
      if (countItem('stone') >= 2) {
        const by = RECIPE_BARS_Y + 4 * (RECIPE_BAR_H + RECIPE_BAR_GAP);
        const hovering = mouseCanvasX >= RECIPE_BAR_X &&
                         mouseCanvasX < RECIPE_BAR_X + RECIPE_BAR_W &&
                         mouseCanvasY >= by &&
                         mouseCanvasY < by + RECIPE_BAR_H;
        if (hovering) {
          drawText('Required:', RECIPE_BAR_X + RECIPE_BAR_W / 2, by + 4, '#222');
          drawText('2 Stone', RECIPE_BAR_X + RECIPE_BAR_W / 2, by + 10, '#222');
        } else {
          drawSprite(FURNACE_INV_SPRITE, RECIPE_BAR_X + 2, by + 2, FURNACE_INV_COLORS);
        }
      }
    } else if (craftPage === 1) {
      // Recipe 5: Plank (1 log)
      if (countItem('log') >= 1) {
        const by = RECIPE_BARS_Y;
        const hovering = mouseCanvasX >= RECIPE_BAR_X &&
                         mouseCanvasX < RECIPE_BAR_X + RECIPE_BAR_W &&
                         mouseCanvasY >= by &&

    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#444';
    ctx.fillRect(UI_OX, UI_OY, UI_REF_W, UI_REF_H);
    ctx.fillStyle = '#2a2a30';
    ctx.fillRect(CRAFT_LEFT_X, INV_Y, CRAFT_LEFT_W, INV_SIZE);
    drawInvBox(CRAFT_LEFT_X, UI_OY, 'Anvil', CRAFT_LEFT_W);
    // Draw 5 recipe bar slots
    for (let i = 0; i < 5; i++) {
      const by = RECIPE_BARS_Y + i * (RECIPE_BAR_H + RECIPE_BAR_GAP);
      ctx.fillStyle = '#c8c8c8';
      ctx.fillRect(RECIPE_BAR_X, by, RECIPE_BAR_W, RECIPE_BAR_H);
    }
    // Page indicator
    const anvilMaxPage = Math.ceil(SALVAGE_RECIPES.length / 5) - 1;
    const pageText = (anvilPage + 1) + '/' + (anvilMaxPage + 1);
    drawText(pageText, CRAFT_LEFT_X + CRAFT_LEFT_W / 2, INV_Y + INV_SIZE - 4, '#a0a0a8');
    // Up arrow
    const arrowX = CRAFT_LEFT_X + Math.floor(CRAFT_LEFT_W / 2);
    const upArrowY = RECIPE_BARS_Y - 6;
    ctx.fillStyle = anvilPage > 0 ? '#a0a0a8' : '#3a3a3e';
    ctx.beginPath();
    ctx.moveTo(arrowX, upArrowY - 2);
    ctx.lineTo(arrowX - 5, upArrowY + 3);
    ctx.lineTo(arrowX + 5, upArrowY + 3);

    ctx.fill();
    // Down arrow
    const downArrowY = RECIPE_BARS_Y + 5 * (RECIPE_BAR_H + RECIPE_BAR_GAP) - 2;
    ctx.fillStyle = anvilPage < anvilMaxPage ? '#a0a0a8' : '#3a3a3e';

    ctx.moveTo(arrowX, downArrowY + 5);
    ctx.lineTo(arrowX - 5, downArrowY);
    ctx.lineTo(arrowX + 5, downArrowY);
    ctx.closePath();
    ctx.fill();
    // Draw salvage recipes for current page
    const pageRecipes = SALVAGE_RECIPES.slice(anvilPage * 5, anvilPage * 5 + 5);
    for (let i = 0; i < pageRecipes.length; i++) {
      const recipe = pageRecipes[i];

  function getDarkness() {
    if (player.y > 40000) return 0.65; // always dim in cave
    const t = dayTimer % CYCLE_LENGTH;
    if (t < DAY_LENGTH - TRANSITION_TIME) return 0; // full day
    if (t < DAY_LENGTH) return (t - (DAY_LENGTH - TRANSITION_TIME)) / TRANSITION_TIME; // day→night
    if (t < DAY_LENGTH + NIGHT_LENGTH - TRANSITION_TIME) return 1; // full night
    return 1 - (t - (DAY_LENGTH + NIGHT_LENGTH - TRANSITION_TIME)) / TRANSITION_TIME; // night→day
  }

    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(g);
    g.connect(dest || masterGain);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);

  function playMusicNote(freq, dur, threat) {
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const osc3 = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const filt = audioCtx.createBiquadFilter();
    // Under threat: shift from triangle to sawtooth for grittier sound
    osc.type = threat > 3 ? 'sawtooth' : 'triangle';
    osc.frequency.value = freq;
    osc2.type = 'sine';
    osc2.frequency.value = freq * 2.002;
    osc3.type = 'sine';
    osc3.frequency.value = freq * (threat > 5 ? 1.498 : 3.01); // dissonant under high threat
    filt.type = 'lowpass';
    const filterBase = threat > 3 ? freq * 4 : freq * 6;
    filt.frequency.setValueAtTime(filterBase, t);
    filt.frequency.exponentialRampToValueAtTime(freq * 1.5, t + dur * 0.4);
    // Volume: louder with threat, peaks on long notes
    const baseVol = 0.06 + Math.random() * 0.04 + threat * 0.008;
    const peak = dur > 1.5 ? 0.05 : 0;
    const vol = Math.min(0.18, baseVol + peak);
    g.gain.setValueAtTime(vol, t);
    g.gain.setValueAtTime(vol * 0.85, t + 0.03);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(filt); osc2.connect(filt); osc3.connect(filt);
    filt.connect(g); g.connect(masterGain);
    osc.start(t); osc2.start(t); osc3.start(t);
    osc.stop(t + dur); osc2.stop(t + dur); osc3.stop(t + dur);
  }

  // Threat-driven percussion hit
  function playThreatBeat() {
    const bufSize = audioCtx.sampleRate * 0.08;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/bufSize, 2);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const filt = audioCtx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 200;
    const g = audioCtx.createGain();
    g.gain.value = 0.06;
    src.connect(filt); filt.connect(g); g.connect(masterGain);
    src.start();
  }

  function updateMusic(dt, inCave, isNightNow) {
    // Compute threat
    let threat = 0;
    const pd = 150;
    for (const g of golems) { const dx = g.x - player.x, dy = g.y - player.y; if (dx*dx+dy*dy < pd*pd) threat += 1; }
    for (const g of stoneGolems) { const dx = g.x - player.x, dy = g.y - player.y; if (dx*dx+dy*dy < pd*pd) threat += 2; }
    for (const g of ironGolems) { const dx = g.x - player.x, dy = g.y - player.y; if (dx*dx+dy*dy < pd*pd) threat += 3; }
    for (const g of goldGolems) { const dx = g.x - player.x, dy = g.y - player.y; if (dx*dx+dy*dy < pd*pd) threat += 4; }
    for (const g of diamondGolems) { const dx = g.x - player.x, dy = g.y - player.y; if (dx*dx+dy*dy < pd*pd) threat += 5; }
    for (const g of obsidianGolems) { const dx = g.x - player.x, dy = g.y - player.y; if (dx*dx+dy*dy < pd*pd) threat += 6; }
    musicThreat = threat;
    musicPlaybackRate = Math.min(2.5, 1.0 + threat * 0.12);

    // Music plays everywhere now (surface + caves)

    if (!musicPlaying) {
      musicCooldown -= dt;
      if (musicCooldown <= 0) {
        musicPlaying = true;
        // Pick track based on current biome or cave
        const biome = inCave ? 'cave' : getBiome(player.x, player.y);
        const tracks = BIOME_TRACKS[biome] || BIOME_TRACKS.forest;
        musicTrack = tracks[Math.floor(Math.random() * tracks.length)];
        musicNoteIdx = 0;
        musicTimer = 0;
      }
      return;
    }

    musicTimer -= dt;
    if (musicTimer <= 0) {
      const pattern = TRACK_PATTERNS[musicTrack];
      if (musicNoteIdx >= pattern.length) {
        musicPlaying = false;
        musicCooldown = 20 + Math.random() * 30;
        return;
      }
      const [noteIdx, durMul] = pattern[musicNoteIdx];
      const notes = MUSIC_NOTES[musicTrack];
      if (noteIdx >= 0) {
        let freq = notes[noteIdx];
        let noteDur = durMul * 1.2;
        // Night: lower pitch, longer notes, more dramatic
        if (isNightNow && !inCave) {
          freq *= 0.7;
          noteDur *= 1.3;
        }
        // Cave: even longer sustain, very dramatic baseline
        if (inCave) {
          noteDur *= 1.5;
        }
        const effectiveThreat = inCave ? musicThreat + 5 : (isNightNow ? musicThreat + 3 : musicThreat);
        playMusicNote(freq, noteDur, effectiveThreat);
        // Percussion beats under threat, night, or cave
        if (effectiveThreat > 2 && Math.random() < 0.3) playThreatBeat();
        if ((isNightNow || inCave) && Math.random() < 0.2) playThreatBeat();
      }
      musicNoteIdx++;
      const tempoMod = inCave ? 0.65 : (isNightNow ? 0.8 : 1.0);
      musicTimer = (MUSIC_BASE_TEMPO * durMul) / (musicPlaybackRate * tempoMod);
    }
  }

  function playFootstep(cave) {
    const makeStep = (dest) => {
      const bufSize = audioCtx.sampleRate * 0.05;
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) {

      }
      const src = audioCtx.createBufferSource();
      src.buffer = buf;

      filt.type = 'lowpass';
      filt.frequency.value = cave ? 250 : 600;

      filt.connect(g);
      g.connect(dest);

    if (cave) {
      playSoundWithEcho(makeStep);
    } else {
      makeStep(masterGain);

  function updateSFX(dt, moving, inCave) {
    // Resume audio context on first interaction
    if (audioCtx.state === 'suspended') audioCtx.resume();

    // Player footsteps
    if (moving && !gamePaused && !playerDead) {
      footstepTimer -= dt;
      if (footstepTimer <= 0) {
        playFootstep(inCave);
        footstepTimer = 0.3;

        drawables.push({
          sortY: fu.y + FURNACE_H,
          draw: () => {
            drawFurnaceWorld(fu.x, fu.y);
            if (getDarkness() > 0 && fu.lastUsed && performance.now() - fu.lastUsed < 30000) {
              const fcx = fu.x + FURNACE_W / 2;
              const fcy = fu.y + FURNACE_H / 2;
              const glowAlpha = 0.04 * getDarkness();
              for (let r = 20; r > 0; r -= 4) {
                ctx.fillStyle = 'rgba(255,160,60,' + glowAlpha + ')';
                ctx.fillRect(fcx - r, fcy - r, r * 2, r * 2);
              }
            }
          },
        });
      }
    }
    for (const pl of planks) {
      if (pl.x < wx1 && pl.x + PLANK_W > wx0 &&
          pl.y < wy1 && pl.y + PLANK_H > wy0) {
        drawables.push({
          sortY: pl.y + PLANK_H,
          draw: () => drawPlankWorld(pl.x, pl.y),
        });
      }
    }
    for (const sb of stoneBricks) {
      if (sb.x < wx1 && sb.x + STONE_BRICK_W > wx0 &&
          sb.y < wy1 && sb.y + STONE_BRICK_H > wy0) {
        drawables.push({
          sortY: sb.y + STONE_BRICK_H,
          draw: () => drawStoneBrickWorld(sb.x, sb.y),
        });
      }
    }
    for (const ch of chests) {
      if (ch.x < wx1 && ch.x + CHEST_W > wx0 &&
          ch.y < wy1 && ch.y + CHEST_H > wy0) {
        drawables.push({
          sortY: ch.y + CHEST_H,
          draw: () => drawChestWorld(ch.x, ch.y),
        });
      }
    }
    for (const an of anvils) {
      if (an.x < wx1 && an.x + ANVIL_W > wx0 &&
          an.y < wy1 && an.y + ANVIL_H > wy0) {
        drawables.push({
          sortY: an.y + ANVIL_H,
          draw: () => drawAnvilWorld(an.x, an.y),
        });
      }
    }
    for (const rs of respawners) {
      if (rs.x < wx1 && rs.x + RESPAWNER_W > wx0 &&
          rs.y < wy1 && rs.y + RESPAWNER_H > wy0) {
        drawables.push({
          sortY: rs.y + RESPAWNER_H,
          draw: () => drawRespawnerWorld(rs.x, rs.y),
        });
      }
    }
    for (const dt of deathTombstones) {
      if (dt.x < wx1 && dt.x + GRAVE_W > wx0 &&
          dt.y < wy1 && dt.y + GRAVE_H > wy0) {
        drawables.push({
          sortY: dt.y + GRAVE_H,
          draw: () => drawGrave(dt.x, dt.y),
        });
      }
    }
    for (const g of golems) {
      if (g.x < wx0 - WOODEN_GOLEM_W || g.x > wx1 ||
          g.y < wy0 - WOODEN_GOLEM_H || g.y > wy1) continue;
      const gx = Math.round(g.x);
      const gy = Math.round(g.y);
      const attacking = g.damageCooldown > GOLEM_DAMAGE_COOLDOWN - GOLEM_ATTACK_SHOW;
      const upper = attacking ? GOLEM_ATTACK_UPPER : GOLEM_UPPER;
      const legFrame = Math.floor(g.animTime / GOLEM_WALK_FRAME) % 2;
      const legs = legFrame === 0 ? GOLEM_LEGS_STAND : GOLEM_LEGS_STEP;
      const ghp = g.hp, gmaxHp = g.maxHp;
      drawables.push({
        sortY: gy + WOODEN_GOLEM_H,
        draw: () => {
          drawWoodenGolem(gx, gy, upper, legs);
          const totalW = gmaxHp * 7 - 2;
          const hx0 = gx + Math.floor((WOODEN_GOLEM_W - totalW) / 2);
          const hy = gy - 8;
          for (let hi = 0; hi < gmaxHp; hi++) {
            drawHeart(hx0 + hi * 7, hy, hi < ghp ? '#e03030' : '#1a1a1a');
          }
        },
      });
    }
    for (const g of stoneGolems) {
      if (g.x < wx0 - STONE_GOLEM_W || g.x > wx1 ||
          g.y < wy0 - STONE_GOLEM_H || g.y > wy1) continue;
      const gx = Math.round(g.x);
      const gy = Math.round(g.y);
      const attacking = g.damageCooldown > GOLEM_DAMAGE_COOLDOWN - GOLEM_ATTACK_SHOW;
      const upper = attacking ? STONE_GOLEM_ATTACK_UPPER : STONE_GOLEM_UPPER;
      const legFrame = Math.floor(g.animTime / GOLEM_WALK_FRAME) % 2;
      const legs = legFrame === 0 ? GOLEM_LEGS_STAND : GOLEM_LEGS_STEP;
      const ghp = g.hp, gmaxHp = g.maxHp;
      drawables.push({
        sortY: gy + STONE_GOLEM_H,
        draw: () => {
          drawStoneGolem(gx, gy, upper, legs);
          const totalW = gmaxHp * 7 - 2;
          const hx0 = gx + Math.floor((STONE_GOLEM_W - totalW) / 2);
          const hy = gy - 8;
          for (let hi = 0; hi < gmaxHp; hi++) {
            drawHeart(hx0 + hi * 7, hy, hi < ghp ? '#e03030' : '#1a1a1a');
          }
        },
      });
    }
    for (const g of ironGolems) {
      if (g.x < wx0 - IRON_GOLEM_W || g.x > wx1 ||
          g.y < wy0 - IRON_GOLEM_H || g.y > wy1) continue;
      const gx = Math.round(g.x);
      const gy = Math.round(g.y);
      const attacking = g.damageCooldown > GOLEM_DAMAGE_COOLDOWN - GOLEM_ATTACK_SHOW;
      const upper = attacking ? IRON_GOLEM_ATTACK_UPPER : IRON_GOLEM_UPPER;
      const legFrame = Math.floor(g.animTime / GOLEM_WALK_FRAME) % 2;
      const legs = legFrame === 0 ? GOLEM_LEGS_STAND : GOLEM_LEGS_STEP;
      const ghp = g.hp, gmaxHp = g.maxHp;
      drawables.push({
        sortY: gy + IRON_GOLEM_H,
        draw: () => {
          drawIronGolem(gx, gy, upper, legs);
          const totalW = gmaxHp * 7 - 2;
          const hx0 = gx + Math.floor((IRON_GOLEM_W - totalW) / 2);
          const hy = gy - 8;
          for (let hi = 0; hi < gmaxHp; hi++) {
            drawHeart(hx0 + hi * 7, hy, hi < ghp ? '#e03030' : '#1a1a1a');
          }
        },
      });
    }
    for (const g of goldGolems) {
      if (g.x < wx0 - GOLD_GOLEM_W || g.x > wx1 ||
          g.y < wy0 - GOLD_GOLEM_H || g.y > wy1) continue;
      const gx = Math.round(g.x);
      const gy = Math.round(g.y);
      const attacking = g.damageCooldown > GOLEM_DAMAGE_COOLDOWN - GOLEM_ATTACK_SHOW;
      const upper = attacking ? GOLD_GOLEM_ATTACK_UPPER : GOLD_GOLEM_UPPER;
      const legFrame = Math.floor(g.animTime / GOLEM_WALK_FRAME) % 2;
      const legs = legFrame === 0 ? GOLEM_LEGS_STAND : GOLEM_LEGS_STEP;
      const ghp = g.hp, gmaxHp = g.maxHp;
      drawables.push({
        sortY: gy + GOLD_GOLEM_H,
        draw: () => {
          drawGoldGolem(gx, gy, upper, legs);
          const totalW = gmaxHp * 7 - 2;
          const hx0 = gx + Math.floor((GOLD_GOLEM_W - totalW) / 2);
          const hy = gy - 8;
          for (let hi = 0; hi < gmaxHp; hi++) {
            drawHeart(hx0 + hi * 7, hy, hi < ghp ? '#e03030' : '#1a1a1a');
          }
        },
      });
    }
    for (const g of diamondGolems) {
      if (g.x < wx0 - DIAMOND_GOLEM_W || g.x > wx1 ||
          g.y < wy0 - DIAMOND_GOLEM_H || g.y > wy1) continue;
      const gx = Math.round(g.x);
      const gy = Math.round(g.y);
      const attacking = g.damageCooldown > GOLEM_DAMAGE_COOLDOWN - GOLEM_ATTACK_SHOW;
      const upper = attacking ? DIAMOND_GOLEM_ATTACK_UPPER : DIAMOND_GOLEM_UPPER;
      const legFrame = Math.floor(g.animTime / GOLEM_WALK_FRAME) % 2;
      const legs = legFrame === 0 ? GOLEM_LEGS_STAND : GOLEM_LEGS_STEP;
      const ghp = g.hp, gmaxHp = g.maxHp;
      drawables.push({
        sortY: gy + DIAMOND_GOLEM_H,
        draw: () => {
          drawDiamondGolem(gx, gy, upper, legs);
          const totalW = gmaxHp * 7 - 2;
          const hx0 = gx + Math.floor((DIAMOND_GOLEM_W - totalW) / 2);
          const hy = gy - 8;
          for (let hi = 0; hi < gmaxHp; hi++) {
            drawHeart(hx0 + hi * 7, hy, hi < ghp ? '#e03030' : '#1a1a1a');
          }
        },
      });
    }
    for (const g of obsidianGolems) {
      if (g.x < wx0 - OBSIDIAN_GOLEM_W || g.x > wx1 ||
          g.y < wy0 - OBSIDIAN_GOLEM_H || g.y > wy1) continue;
      const gx = Math.round(g.x);
      const gy = Math.round(g.y);
      const attacking = g.damageCooldown > GOLEM_DAMAGE_COOLDOWN - GOLEM_ATTACK_SHOW;
      const upper = attacking ? OBSIDIAN_GOLEM_ATTACK_UPPER : OBSIDIAN_GOLEM_UPPER;
      const legFrame = Math.floor(g.animTime / GOLEM_WALK_FRAME) % 2;
      const legs = legFrame === 0 ? GOLEM_LEGS_STAND : GOLEM_LEGS_STEP;
      const ghp = g.hp, gmaxHp = g.maxHp;
      drawables.push({
        sortY: gy + OBSIDIAN_GOLEM_H,
        draw: () => {
          drawObsidianGolem(gx, gy, upper, legs);
          const totalW = gmaxHp * 7 - 2;
          const hx0 = gx + Math.floor((OBSIDIAN_GOLEM_W - totalW) / 2);
          const hy = gy - 8;
          for (let hi = 0; hi < gmaxHp; hi++) {
            drawHeart(hx0 + hi * 7, hy, hi < ghp ? '#e03030' : '#1a1a1a');
          }
        },
      });
    }
    drawables.push({
      sortY: py + player.h,
      draw: () => drawPlayer(px, py, WALK_CYCLE[animFrame]),
    });
    drawables.sort((a, b) => a.sortY - b.sortY);
    drawables.forEach(d => d.draw());

    ctx.restore();

    // Night darkness overlay
    const darkness = getDarkness();
    if (darkness > 0) {
      ctx.fillStyle = 'rgba(0,0,20,' + (darkness * 0.55).toFixed(3) + ')';
      ctx.fillRect(0, 0, W, H);
    }

    // Coal glow effect at night
    if (darkness > 0 && hotbarHas('coal')) {
      const pcx = px - camX + player.w / 2;
      const pcy = py - camY + player.h / 2;
      for (let r = 50; r > 0; r -= 5) {
        ctx.fillStyle = 'rgba(255,200,100,' + (0.03 * darkness) + ')';
        ctx.fillRect(pcx - r, pcy - r, r * 2, r * 2);
      }
    }

    // "Night has fallen" message (not shown in cave)
    if (nightMessageTimer > 0 && !inCave) {
      const msgAlpha = nightMessageTimer < 0.5 ? nightMessageTimer / 0.5 : 1;
      ctx.globalAlpha = msgAlpha;
      drawText('Night Has Fallen', W - 50, 8, '#c8c8e8');
      ctx.globalAlpha = 1;
    }
    // "The sun has risen" message
    if (dayMessageTimer > 0 && !inCave) {
      const msgAlpha = dayMessageTimer < 0.5 ? dayMessageTimer / 0.5 : 1;
      ctx.globalAlpha = msgAlpha;
      drawText('The Sun Has Risen', W - 55, 8, '#f0e0a0');
      ctx.globalAlpha = 1;
    }

    drawHearts();
    drawHunger();

    // Hunger messages
    if (hungerMsgTimer > 0 && hungerPoints > 0) {
      const msgAlpha = hungerMsgTimer < 0.5 ? hungerMsgTimer / 0.5 : 1;
      ctx.globalAlpha = msgAlpha;
      drawText('You Are Getting Hungry', W - 60, 16, '#c8a040');
      ctx.globalAlpha = 1;
    }
    if (starveMsgTimer > 0 && hungerPoints <= 0) {
      const msgAlpha = starveMsgTimer < 0.5 ? starveMsgTimer / 0.5 : 1;
      ctx.globalAlpha = msgAlpha;
      drawText('You Are Starving!', W - 50, 16, '#e03030');
      ctx.globalAlpha = 1;
    }

    // Player coordinates
    drawText(Math.floor(player.x) + ' ' + Math.floor(player.y), 30, 4, '#e8e8e8');

    // Save button (top right)
    const saveBtnW = 20;
    const saveBtnH = 8;
    const saveBtnX = W - saveBtnW - 2;
    const saveBtnY = 1;
    ctx.fillStyle = '#2a2a3a';
    ctx.fillRect(saveBtnX, saveBtnY, saveBtnW, saveBtnH);
    drawText('Save', saveBtnX + saveBtnW / 2, saveBtnY + saveBtnH / 2, '#aaa');

    // Game mode indicator
    if (gameMode === 'peaceful') drawText('[Peaceful]', 30, 10, '#5a8a5a');
    else if (gameMode === 'hardcore') drawText('[Hardcore]', 30, 10, '#8a5a5a');

    // Save confirmation message
    if (saveMessageTimer > 0) {
      const alpha = Math.min(1, saveMessageTimer / 0.5);
      ctx.globalAlpha = alpha;
      drawText('Game Saved!', W / 2, 12, '#4ae84a');
      ctx.globalAlpha = 1;
    }

    if (inventoryOpen) drawInventory();
    else if (craftingOpen) drawCrafting();
    else if (bridgeOpen) drawBridgeUI();
    else if (furnaceOpen) drawFurnaceUI();
    else if (chestOpen) drawChestUI();
    else if (anvilOpen) drawAnvilUI();
    drawHotbar();
    drawHotbarLabel();
    drawDragGhost();
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const ft = floatingTexts[i];
      ft.timer -= dt;
      if (ft.timer <= 0) { floatingTexts.splice(i, 1); continue; }
      const alpha = Math.min(1, ft.timer / 0.3);
      const rise = (FLOAT_TEXT_DURATION - ft.timer) * 8;
      ctx.globalAlpha = alpha;
      drawText(ft.text, ft.x, ft.y - rise, '#e03030');
      ctx.globalAlpha = 1;
    }
    if (playerDead) drawDeathScreen();
    if (gamePaused) drawPauseMenu();
    if (gameWon) drawWinScreen();

    // Shaft transition overlay (drawn on top of everything)
    if (shaftTransitionPhase === 'fadeOut') {
      const alpha = 1 - Math.max(0, shaftTransitionTimer) / 1.0;
      ctx.fillStyle = 'rgba(0,0,0,' + alpha.toFixed(3) + ')';
      ctx.fillRect(0, 0, W, H);
    } else if (shaftTransitionPhase === 'black') {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
    } else if (shaftTransitionPhase === 'fadeIn') {
      const alpha = Math.max(0, shaftTransitionTimer) / 1.0;
      ctx.fillStyle = 'rgba(0,0,0,' + alpha.toFixed(3) + ')';
      ctx.fillRect(0, 0, W, H);
    }

    const _t1 = performance.now();
    if (_t1 - _t0 > 100) console.warn('Slow frame:', (_t1-_t0).toFixed(0) + 'ms');
    } catch(err) {
      console.error('Game loop error:', err);
      // Draw error on screen so user can see it
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(0, 0, W, 20);
      drawText('Error ' + err.message, W/2, 10, '#ffffff');
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
