<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Obsidian Frame v1.0</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #1a1a2e;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: monospace;
    color: #eee;
  }
  canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #3aa63a;
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
  <canvas id="game" width="160" height="120"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // --- Game State Machine ---
  let gameState = 'title'; // 'title', 'settings', 'newworld', 'loadworld', 'playing'
  let gameMode = 'normal'; // 'peaceful', 'normal', 'hardcore'
  let currentWorldSlot = -1;
  let worldNameInput = '';
  let selectedMode = 'normal';
  let saveMessageTimer = 0;
  let musicVolume = 0.25;
  let sfxVolume = 0.25;

  // Load settings from localStorage
  try {
    const savedSettings = JSON.parse(localStorage.getItem('pixelgame_settings'));
    if (savedSettings) {
      musicVolume = savedSettings.musicVolume ?? 0.25;
      sfxVolume = savedSettings.sfxVolume ?? 0.25;
    }
  } catch(e) {}

  function saveSettings() {
    localStorage.setItem('pixelgame_settings', JSON.stringify({ musicVolume, sfxVolume }));
  }

  function getWorlds() {
    try {
      const w = JSON.parse(localStorage.getItem('pixelgame_worlds'));
      if (Array.isArray(w) && w.length === 5) return w;
    } catch(e) {}
    // Reset if corrupted
    const fresh = [null, null, null, null, null];
    localStorage.setItem('pixelgame_worlds', JSON.stringify(fresh));
    return fresh;
  }

  function saveWorlds(worlds) {
    localStorage.setItem('pixelgame_worlds', JSON.stringify(worlds));
  }

  const SCALE = 4;
  let W, H;
  function resizeCanvas() {
    W = Math.floor(window.innerWidth / SCALE);
    H = Math.floor(window.innerHeight / SCALE);
    canvas.width = W;
    canvas.height = H;
    ctx.imageSmoothingEnabled = false;
  }
  function recalcUI() {
    RESPAWN_BTN_X = Math.floor((W - RESPAWN_BTN_W) / 2);
    UI_OX = Math.floor((W - UI_REF_W) / 2);
    UI_OY = Math.floor((H - UI_REF_H) / 2);
    INV_X = UI_OX + Math.floor((UI_REF_W - INV_SIZE) / 2);
    CRAFT_INV_X = UI_OX + UI_REF_W - INV_SIZE - 4;
    CRAFT_LEFT_X = UI_OX + 4;
    CRAFT_LEFT_W = CRAFT_INV_X - CRAFT_LEFT_X - 4;
    INV_Y = UI_OY + INV_BOX_H + 1;
    INV_FOOTER_Y = INV_Y + INV_SIZE + 1;
    HOTBAR_X = Math.floor((W - HOTBAR_W) / 2);
    HOTBAR_Y = H - HOTBAR_H;
    RECIPE_BAR_W = CRAFT_LEFT_W - 6;
    RECIPE_BAR_X = CRAFT_LEFT_X + 3;
    RECIPE_BARS_Y = INV_Y + 4;
    BRIDGE_PANEL_X = CRAFT_LEFT_X;
    BRIDGE_PANEL_W = CRAFT_LEFT_W;
    BRIDGE_SLOT_X = BRIDGE_PANEL_X + Math.floor((BRIDGE_PANEL_W - INV_CELL) / 2);
    BRIDGE_SLOT_Y0 = INV_Y + INV_BORDER;
    ARMOR_SLOT_X = INV_X + INV_SIZE + 4;
    ARMOR_SLOT_Y = INV_Y + INV_BORDER;
  }
  resizeCanvas();
  window.addEventListener('resize', () => { resizeCanvas(); recalcUI(); });
  let camX = 0, camY = 0;

  const player = {
    x: 0, // set after spawnPos is calculated
    y: 0,
    w: 8,
    h: 14,
    speed: 55,
  };
  let playerHP = 5;
  const MAX_HP = 5;
  let armorHP = 0;
  const ARMOR_MAX_HP = 3;
  let goldArmorHP = 0;
  const GOLD_ARMOR_MAX_HP = 1;
  let diamondArmorHP = 0;
  const DIAMOND_ARMOR_MAX_HP = 1;
  let playerDead = false;
  let gamePaused = false;
  let gameWon = false;
  let lavaTimer = 0;

  // Hunger system
  let hungerPoints = 5;
  const MAX_HUNGER = 5;
  let hungerTimer = 0;
  let hungerMsgTimer = 0;
  let starveMsgTimer = 0;
  let hungerHealTimer = 0;
  let starveTimer = 0;
  const portals = [];

  const RESPAWN_BTN_W = 40;
  const RESPAWN_BTN_H = 10;
  let RESPAWN_BTN_X = Math.floor((W - RESPAWN_BTN_W) / 2);
  const RESPAWN_BTN_Y = 68;

  function drawDeathScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
    if (gameMode === 'hardcore') {
      drawText('Game Over!', W / 2, 45, '#e03030');
      drawText('Hardcore World Deleted', W / 2, 55, '#aa3030');
      ctx.fillStyle = '#6a2a2a';
      ctx.fillRect(RESPAWN_BTN_X, RESPAWN_BTN_Y, RESPAWN_BTN_W, RESPAWN_BTN_H);
      drawText('Title', W / 2, RESPAWN_BTN_Y + RESPAWN_BTN_H / 2, '#e8c8c8');
    } else {
      drawText('You Died!', W / 2, 50, '#1a1a1a');
      ctx.fillStyle = '#c8c8c8';
      ctx.fillRect(RESPAWN_BTN_X, RESPAWN_BTN_Y, RESPAWN_BTN_W, RESPAWN_BTN_H);
      drawText('Respawn', W / 2, RESPAWN_BTN_Y + RESPAWN_BTN_H / 2, '#222');
    }
  }

  const WIN_BTN_W = 50;
  const WIN_BTN_H = 12;
  function drawWinScreen() {
    ctx.fillStyle = 'rgba(10,0,20,0.75)';
    ctx.fillRect(0, 0, W, H);
    drawText('You Win!', W / 2, H / 2 - 20, '#d0a0ff');
    drawText('You escaped through', W / 2, H / 2 - 8, '#b080dd');
    drawText('the obsidian portal', W / 2, H / 2, '#b080dd');
    const btnX = Math.floor((W - WIN_BTN_W) / 2);
    const btnY = Math.floor(H / 2) + 12;
    ctx.fillStyle = '#4a1a6a';
    ctx.fillRect(btnX, btnY, WIN_BTN_W, WIN_BTN_H);
    ctx.fillStyle = '#6a2a8a';
    ctx.fillRect(btnX + 1, btnY + 1, WIN_BTN_W - 2, WIN_BTN_H - 2);
    drawText('Play Again', btnX + WIN_BTN_W / 2, btnY + WIN_BTN_H / 2, '#e8d0ff');
  }

  function respawn() {
    playerHP = MAX_HP;
    armorHP = (armorSlot === 'iron_armor' || armorSlot === 'gold_armor' || armorSlot === 'diamond_armor') ? ARMOR_MAX_HP : 0;
    goldArmorHP = (armorSlot === 'gold_armor' || armorSlot === 'diamond_armor') ? GOLD_ARMOR_MAX_HP : 0;
    diamondArmorHP = armorSlot === 'diamond_armor' ? DIAMOND_ARMOR_MAX_HP : 0;
    playerDead = false;
    hungerPoints = MAX_HUNGER;
    hungerTimer = 0;
    starveTimer = 0;
    hungerHealTimer = 0;
    if (lastRespawner) {
      player.x = lastRespawner.x;
      player.y = lastRespawner.y;
    } else if (craftingTables.length > 0) {
      player.x = craftingTables[0].x - 10;
      player.y = craftingTables[0].y;
    } else {
      player.x = spawnPos.x;
      player.y = spawnPos.y;
    }
    golems.length = 0;
    stoneGolems.length = 0;
    ironGolems.length = 0;
    goldGolems.length = 0;
    diamondGolems.length = 0;
    obsidianGolems.length = 0;
    inventoryOpen = false;
    craftingOpen = false;
    anvilOpen = false;
  }

  function drawHeart(x, y, color) {
    // Black outline
    ctx.fillStyle = '#000000';
    ctx.fillRect(x + 1, y - 1, 1, 1);
    ctx.fillRect(x + 3, y - 1, 1, 1);
    ctx.fillRect(x, y, 1, 1);
    ctx.fillRect(x + 2, y, 1, 1);
    ctx.fillRect(x + 4, y, 1, 1);
    ctx.fillRect(x - 1, y + 1, 1, 1);
    ctx.fillRect(x + 5, y + 1, 1, 1);
    ctx.fillRect(x - 1, y + 2, 1, 1);
    ctx.fillRect(x + 5, y + 2, 1, 1);
    ctx.fillRect(x, y + 3, 1, 1);
    ctx.fillRect(x + 4, y + 3, 1, 1);
    ctx.fillRect(x + 1, y + 4, 1, 1);
    ctx.fillRect(x + 3, y + 4, 1, 1);
    ctx.fillRect(x + 2, y + 5, 1, 1);
    // Fill
    ctx.fillStyle = color;
    ctx.fillRect(x + 1, y, 1, 1);
    ctx.fillRect(x + 3, y, 1, 1);
    ctx.fillRect(x, y + 1, 5, 1);
    ctx.fillRect(x, y + 2, 5, 1);
    ctx.fillRect(x + 1, y + 3, 3, 1);
    ctx.fillRect(x + 2, y + 4, 1, 1);
  }

  function drawHearts() {
    for (let i = 0; i < MAX_HP; i++) {
      const hx = HOTBAR_X + 1 + i * 7;
      const hy = HOTBAR_Y - 8;
      drawHeart(hx, hy, i < playerHP ? '#e03030' : '#1a1a1a');
    }
    if (armorSlot === 'iron_armor' || armorSlot === 'gold_armor' || armorSlot === 'diamond_armor') {
      for (let i = 0; i < ARMOR_MAX_HP; i++) {
        const hx = HOTBAR_X + 1 + (MAX_HP + i) * 7;
        const hy = HOTBAR_Y - 8;
        drawHeart(hx, hy, i < armorHP ? '#8a8a92' : '#1a1a1e');
      }
    }
    if (armorSlot === 'gold_armor' || armorSlot === 'diamond_armor') {
      for (let i = 0; i < GOLD_ARMOR_MAX_HP; i++) {
        const hx = HOTBAR_X + 1 + (MAX_HP + ARMOR_MAX_HP + i) * 7;
        const hy = HOTBAR_Y - 8;
        drawHeart(hx, hy, i < goldArmorHP ? '#e0b840' : '#1a1a1e');
      }
    }
    if (armorSlot === 'diamond_armor') {
      for (let i = 0; i < DIAMOND_ARMOR_MAX_HP; i++) {
        const hx = HOTBAR_X + 1 + (MAX_HP + ARMOR_MAX_HP + GOLD_ARMOR_MAX_HP + i) * 7;
        const hy = HOTBAR_Y - 8;
        drawHeart(hx, hy, i < diamondArmorHP ? '#66aaee' : '#1a1a1e');
      }
    }
  }

  // Hunger icon: drumstick shape (same size as hearts — 5 wide, 5 tall)
  function drawHungerPoint(x, y, color) {
    // Black outline
    ctx.fillStyle = '#000000';
    ctx.fillRect(x + 2, y, 3, 1);
    ctx.fillRect(x + 1, y + 1, 4, 1);
    ctx.fillRect(x + 1, y + 2, 1, 1);
    ctx.fillRect(x + 4, y + 2, 1, 1);
    ctx.fillRect(x, y + 3, 2, 1);
    ctx.fillRect(x + 4, y + 3, 1, 1);
    ctx.fillRect(x, y + 4, 1, 1);
    ctx.fillRect(x + 3, y + 4, 1, 1);
    ctx.fillRect(x, y + 5, 1, 1);
    // Meat fill
    ctx.fillStyle = color;
    ctx.fillRect(x + 2, y + 1, 2, 1);
    ctx.fillRect(x + 2, y + 2, 2, 1);
    ctx.fillRect(x + 2, y + 3, 2, 1);
    // Bone
    ctx.fillStyle = color === '#1a1a1a' ? '#1a1a1a' : '#e8dcc0';
    ctx.fillRect(x + 1, y + 3, 1, 1);
    ctx.fillRect(x + 1, y + 4, 2, 1);
  }

  function drawHunger() {
    for (let i = 0; i < MAX_HUNGER; i++) {
      const hx = HOTBAR_X + 1 + i * 7;
      const hy = HOTBAR_Y - 16;
      drawHungerPoint(hx, hy, i < hungerPoints ? '#8a6030' : '#1a1a1a');
    }
  }

  // 8x14 front-facing pixel character, split into a fixed upper body
  // and a swappable 3-row leg section for walk animation.
  const PLAYER_UPPER = [
    '.HHHHHH.',
    'HHHHHHHH',
    'HssssssH',
    'HsOssOsH',
    '.ssssss.',
    '.ssmmss.',
    '..CCCC..',
    'sCCCCCCs',
    'sCCCCCCs',
    'sCCCCCCs',
    '.PPPPPP.',
  ];
  const LEGS_STAND = [
    '.PP..PP.',
    '.PP..PP.',
    '.BB..BB.',
  ];
  // Right foot lifted (boot one row higher), left foot planted.
  const LEGS_STEP_L = [
    '.PP..PP.',
    '.PP..BB.',
    '.BB.....',
  ];
  // Left foot lifted, right foot planted.
  const LEGS_STEP_R = [
    '.PP..PP.',
    '.BB..PP.',
    '.....BB.',
  ];
  const WALK_CYCLE = [LEGS_STAND, LEGS_STEP_L, LEGS_STAND, LEGS_STEP_R];
  const WALK_FRAME_DURATION = 0.13;

  const PLAYER_COLORS = {
    H: '#2d1810', // hair
    s: '#d9a57c', // skin
    O: '#1a1a1a', // eye
    m: '#7a3b22', // mouth
    C: '#0ca5c5', // cyan shirt
    P: '#3b3b8a', // blue pants
    B: '#3a2211', // boots
  };
  // Iron armor: helm band, chestplate, visible skin arms
  const PLAYER_UPPER_IRON = [
    '.AHHHHA.',
    'AHHHHHHA',
    'HssssssH',
    'HsOssOsH',
    '.ssssss.',
    '.ssmmss.',
    '..CCCC..',
    'sCCcCCCs',
    'sCCcCCCs',
    'sCCcCCCs',
    '.PPPPPP.',
  ];
  const PLAYER_COLORS_IRON = {
    A: '#8a8a92',
    H: '#2d1810',
    s: '#d9a57c',
    O: '#1a1a1a',
    m: '#7a3b22',
    C: '#7a7a84',
    c: '#5a5a62',
    P: '#3b3b8a',
    B: '#3a2211',
  };
  // Gold armor: gold band, chestplate, visible skin arms
  const PLAYER_UPPER_GOLD = [
    '.AHHHHA.',
    'AHHHHHHA',
    'HssssssH',
    'HsOssOsH',
    '.ssssss.',
    '.ssmmss.',
    '..CCCC..',
    'sCCcCCCs',
    'sCCcCCCs',
    'sCCcCCCs',
    '.PPPPPP.',
  ];
  const PLAYER_COLORS_GOLD = {
    A: '#e0b840',
    H: '#2d1810',
    s: '#d9a57c',
    O: '#1a1a1a',
    m: '#7a3b22',
    C: '#c8a030',
    c: '#a08020',
    P: '#3b3b8a',
    B: '#3a2211',
  };
  // Diamond armor: tall crown, heavy chainmail, visible skin arms
  const PLAYER_UPPER_DIAMOND = [
    'a.aAaA.a',
    'AAAAAAAA',
    'AadddaAH',
    'AsOssOsA',
    '.ssssss.',
    '.ssmmss.',
    '..CcCc..',
    'sCcCcCcs',
    'sCCcCCCs',
    'sCcCcCcs',
    '.PPPPPP.',
  ];
  const PLAYER_COLORS_DIAMOND = {
    A: '#4488cc',
    a: '#66aaee',
    d: '#88ccff',
    H: '#2d1810',
    s: '#d9a57c',
    O: '#1a1a1a',
    m: '#7a3b22',
    C: '#4488cc',
    c: '#336699',
    P: '#3a5a8a',
    B: '#2a4a7a',
  };

  function drawPlayer(px, py, legs) {
    const upper = armorSlot === 'diamond_armor' ? PLAYER_UPPER_DIAMOND :
                  armorSlot === 'gold_armor' ? PLAYER_UPPER_GOLD :
                  armorSlot === 'iron_armor' ? PLAYER_UPPER_IRON :
                  PLAYER_UPPER;
    const sprite = [...upper, ...legs];
    const colors = armorSlot === 'diamond_armor' ? PLAYER_COLORS_DIAMOND :
                   armorSlot === 'gold_armor' ? PLAYER_COLORS_GOLD :
                   armorSlot === 'iron_armor' ? PLAYER_COLORS_IRON :
                   PLAYER_COLORS;
    for (let row = 0; row < sprite.length; row++) {
      const line = sprite[row];
      for (let col = 0; col < line.length; col++) {
        const ch = line[col];
        if (ch === '.') continue;
        ctx.fillStyle = colors[ch];
        ctx.fillRect(px + col, py + row, 1, 1);
      }
    }
  }

  // Collision is based on the feet area only, so the head can visually overlap trees.
  function playerFeetBox(px, py) {
    return { x: px + 1, y: py + 10, w: 6, h: 4 };
  }

  // Mountains are walkable terrain — no collision blocking
  function feetInMountain() { return false; }

  function hasWalkableBridge(wx, wy) {
    for (const pl of planks) {
      if (wx >= pl.x && wx < pl.x + PLANK_W && wy >= pl.y && wy < pl.y + PLANK_H) return true;
    }
    for (const sb of stoneBricks) {
      if (wx >= sb.x && wx < sb.x + STONE_BRICK_W && wy >= sb.y && wy < sb.y + STONE_BRICK_H) return true;
    }
    return false;
  }

  function feetInOcean(px, py) {
    const f = playerFeetBox(px, py);
    if (getBiome(f.x, f.y) === 'ocean' && !hasWalkableBridge(f.x, f.y)) return true;
    if (getBiome(f.x + f.w, f.y) === 'ocean' && !hasWalkableBridge(f.x + f.w, f.y)) return true;
    if (getBiome(f.x, f.y + f.h) === 'ocean' && !hasWalkableBridge(f.x, f.y + f.h)) return true;
    if (getBiome(f.x + f.w, f.y + f.h) === 'ocean' && !hasWalkableBridge(f.x + f.w, f.y + f.h)) return true;
    return false;
  }

  function golemInOcean(gx, gy, gw, gh) {
    if (getBiome(gx, gy + gh) === 'ocean' && !hasWalkableBridge(gx, gy + gh)) return true;
    if (getBiome(gx + gw, gy + gh) === 'ocean' && !hasWalkableBridge(gx + gw, gy + gh)) return true;
    return false;
  }

  // Random seed — changes every page load for unique worlds.
  let WORLD_SEED = Math.random() * 100000;

  // Deterministic pseudo-random so grass tufts don't shimmer each frame.
  function rand(x, y) {
    const s = Math.sin(x * 127.1 + y * 311.7 + WORLD_SEED * 1.731) * 43758.5453;
    return s - Math.floor(s);
  }

  // Tree positions: (x, y) is the base of the trunk (where it meets the ground).
  let trees = [];
  // Deterministic scatter seeded per world.
  function scatterHash(i, salt) {
    const s = Math.sin(i * 91.3 + salt * 57.7 + WORLD_SEED * 0.937) * 43758.5453;
    return s - Math.floor(s);
  }

  // --- Biome system ---
  function biomeNoise(wx, wy) {
    const SCALE = 256;
    const gx = Math.floor(wx / SCALE);
    const gy = Math.floor(wy / SCALE);
    const fx = (wx / SCALE) - gx;
    const fy = (wy / SCALE) - gy;
    const sx = fx * fx * (3 - 2 * fx);
    const sy = fy * fy * (3 - 2 * fy);
    const n00 = rand(gx * 173 + 50, gy * 173 + 50);
    const n10 = rand((gx+1) * 173 + 50, gy * 173 + 50);
    const n01 = rand(gx * 173 + 50, (gy+1) * 173 + 50);
    const n11 = rand((gx+1) * 173 + 50, (gy+1) * 173 + 50);
    return n00*(1-sx)*(1-sy) + n10*sx*(1-sy) + n01*(1-sx)*sy + n11*sx*sy;
  }

  // High-frequency jagged noise for mountain edges
  function edgeNoise(wx, wy) {
    const r1 = rand(Math.floor(wx / 4) * 4 + 700, Math.floor(wy / 4) * 4 + 700);
    const r2 = rand(Math.floor(wx / 8) * 8 + 900, Math.floor(wy / 8) * 8 + 900);
    const r3 = rand(Math.floor(wx / 16) * 16 + 1100, Math.floor(wy / 16) * 16 + 1100);
    return (r1 * 0.04 + r2 * 0.03 + r3 * 0.02);
  }

  let _spawnSet = false;

  function oceanNoise(wx, wy) {
    const SCALE = 512;
    const gx = Math.floor(wx / SCALE);
    const gy = Math.floor(wy / SCALE);
    const fx = (wx / SCALE) - gx;
    const fy = (wy / SCALE) - gy;
    const sx = fx * fx * (3 - 2 * fx);
    const sy = fy * fy * (3 - 2 * fy);
    const n00 = rand(gx * 211 + 777, gy * 211 + 777);
    const n10 = rand((gx+1) * 211 + 777, gy * 211 + 777);
    const n01 = rand(gx * 211 + 777, (gy+1) * 211 + 777);
    const n11 = rand((gx+1) * 211 + 777, (gy+1) * 211 + 777);
    return n00*(1-sx)*(1-sy) + n10*sx*(1-sy) + n01*(1-sx)*sy + n11*sx*sy;
  }

  function getBiome(wx, wy) {
    // Ocean doesn't generate in caves
    if (wy <= 40000) {
      const oceanN = oceanNoise(wx, wy);
      // Don't generate ocean within ~200px of spawn
      const spX = _spawnSet ? spawnPos.x : 0;
      const spY = _spawnSet ? spawnPos.y : 0;
      const spawnDist2 = (wx - spX) * (wx - spX) + (wy - spY) * (wy - spY);
      if (oceanN > 0.7 && spawnDist2 > 200 * 200) return 'ocean';
    }
    const n = biomeNoise(wx, wy);
    const jag = edgeNoise(wx, wy);
    if (n + jag > 0.72) return 'mountain';
    if (n > 0.42) return 'hills';
    return 'forest';
  }

  // Find closest forest biome to origin for spawn
  function findForestSpawn() {
    if (getBiome(0, 0) === 'forest') return { x: 0, y: 0 };
    // Spiral outward in steps of 16px
    for (let radius = 16; radius < 2000; radius += 16) {
      for (let angle = 0; angle < Math.PI * 2; angle += 0.3) {
        const tx = Math.round(Math.cos(angle) * radius);
        const ty = Math.round(Math.sin(angle) * radius);
        if (getBiome(tx, ty) === 'forest') return { x: tx, y: ty };
      }
    }
    return { x: 0, y: 0 }; // fallback
  }
  const spawnPos = findForestSpawn();
  _spawnSet = true;
  player.x = spawnPos.x;
  player.y = spawnPos.y;

  function isMountain(wx, wy) {
    // Fast path: check mountain noise directly without ocean check
    const n = biomeNoise(wx, wy);
    const jag = edgeNoise(wx, wy);
    return n + jag > 0.72;
  }

  // Lava — procedural terrain-based lava in cave mountain areas
  function isLavaTile(wx, wy) {
    if (wy < 40000) return false;
    if (!isMountain(wx, wy)) return false;
    const LAVA_SCALE = 32;
    const gx = Math.floor(wx / LAVA_SCALE);
    const gy = Math.floor(wy / LAVA_SCALE);
    const fx = (wx / LAVA_SCALE) - gx;
    const fy = (wy / LAVA_SCALE) - gy;
    const sx = fx * fx * (3 - 2 * fx);
    const sy = fy * fy * (3 - 2 * fy);
    const n00 = rand(gx * 97 + 333, gy * 97 + 333);
    const n10 = rand((gx+1) * 97 + 333, gy * 97 + 333);
    const n01 = rand(gx * 97 + 333, (gy+1) * 97 + 333);
    const n11 = rand((gx+1) * 97 + 333, (gy+1) * 97 + 333);
    const n = n00*(1-sx)*(1-sy) + n10*sx*(1-sy) + n01*(1-sx)*sy + n11*sx*sy;
    return n > 0.6;
  }

  function inHills(x, y) {
    const b = getBiome(x, y);
    return b === 'hills';
  }

  // --- Chunk system ---
  const CHUNK_SIZE = 128;
  const LOAD_RADIUS = 3;
  const chunks = new Map();
  let lastPlayerChunkX = null;
  let lastPlayerChunkY = null;

  function chunkKey(cx, cy) { return cx + ',' + cy; }

  function generateChunk(cx, cy) {
    const key = chunkKey(cx, cy);
    if (chunks.has(key)) return chunks.get(key);
    const chunk = { cx, cy, trees: [], pigs: [], sheep: [], cows: [], stones: [], ores: [], gold_ores: [], diamond_ores: [], obsidian_ores: [], coal_ores: [], modified: false };
    const x0 = cx * CHUNK_SIZE;
    const y0 = cy * CHUNK_SIZE;
    // Determine dominant biome at chunk center
    const centerX = x0 + CHUNK_SIZE / 2;
    const centerY = y0 + CHUNK_SIZE / 2;
    const biome = getBiome(centerX, centerY);

    const salt = cx * 7919 + cy * 6271;

    // Ocean chunks: no entities at all
    if (biome === 'ocean') {
      chunks.set(key, chunk);
      return chunk;
    }

    // Cave chunks: only generate gold_ores, no trees/animals/stones/ores
    if (y0 > 40000) {
      // Iron ore in cave
      for (let i = 0; i < 5; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 150) * (CHUNK_SIZE - ORE_W));
        const ey = y0 + Math.floor(scatterHash(i, salt + 151) * (CHUNK_SIZE - ORE_H));
        if (isMountain(ex + ORE_W/2, ey + ORE_H/2)) continue;
        if (overlapsAnyShaft(ex, ey, ORE_W, ORE_H)) continue;
        chunk.ores.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
      // Coal ore in cave
      for (let i = 0; i < 4; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 600) * (CHUNK_SIZE - COAL_ORE_W));
        const ey = y0 + Math.floor(scatterHash(i, salt + 601) * (CHUNK_SIZE - COAL_ORE_H));
        if (isMountain(ex + COAL_ORE_W/2, ey + COAL_ORE_H/2)) continue;
        if (overlapsAnyShaft(ex, ey, COAL_ORE_W, COAL_ORE_H)) continue;
        chunk.coal_ores.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
      // Gold ore in cave
      for (let i = 0; i < 4; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 200) * (CHUNK_SIZE - GOLD_ORE_W));
        const ey = y0 + Math.floor(scatterHash(i, salt + 201) * (CHUNK_SIZE - GOLD_ORE_H));
        if (isMountain(ex + GOLD_ORE_W/2, ey + GOLD_ORE_H/2)) continue;
        chunk.gold_ores.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
      // Diamond ore in cave — only on non-mountain areas (cave floor)
      for (let i = 0; i < 3; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 300) * (CHUNK_SIZE - DIAMOND_ORE_W));
        const ey = y0 + Math.floor(scatterHash(i, salt + 301) * (CHUNK_SIZE - DIAMOND_ORE_H));
        if (isMountain(ex + DIAMOND_ORE_W/2, ey + DIAMOND_ORE_H/2)) continue;
        chunk.diamond_ores.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
      // Obsidian ore in cave — on mountain (magma) but NOT on lava tiles
      for (let i = 0; i < 3; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 400) * (CHUNK_SIZE - OBSIDIAN_ORE_W));
        const ey = y0 + Math.floor(scatterHash(i, salt + 401) * (CHUNK_SIZE - OBSIDIAN_ORE_H));
        if (!isMountain(ex + OBSIDIAN_ORE_W/2, ey + OBSIDIAN_ORE_H/2)) continue;
        if (isLavaTile(ex + OBSIDIAN_ORE_W/2, ey + OBSIDIAN_ORE_H/2)) continue;
        chunk.obsidian_ores.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
      chunks.set(key, chunk);
      return chunk;
    }

    if (biome === 'ocean') { chunks.set(key, chunk); return chunk; }

    if (biome === 'forest') {
      for (let i = 0; i < 6; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 1) * CHUNK_SIZE);
        const ey = y0 + Math.floor(scatterHash(i, salt + 2) * CHUNK_SIZE);
        if ((ex-spawnPos.x)*(ex-spawnPos.x) + (ey-spawnPos.y)*(ey-spawnPos.y) < 40*40) continue;
        if (overlapsAnyShaft(ex, ey, 1, 1)) continue;
        if (isMountain(ex, ey)) continue;
        if (getBiome(ex, ey) === 'ocean') continue;
        chunk.trees.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
      for (let i = 0; i < 2; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 3) * (CHUNK_SIZE - PIG_W));
        const ey = y0 + Math.floor(scatterHash(i, salt + 4) * (CHUNK_SIZE - PIG_H));
        if ((ex-spawnPos.x)*(ex-spawnPos.x) + (ey-spawnPos.y)*(ey-spawnPos.y) < 40*40) continue;
        if (overlapsAnyShaft(ex, ey, PIG_W, PIG_H)) continue;
        if (isMountain(ex + PIG_W/2, ey + PIG_H/2)) continue;
        if (getBiome(ex + PIG_W/2, ey + PIG_H/2) === 'ocean') continue;
        chunk.pigs.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
    } else if (biome === 'hills') {
      for (let i = 0; i < 4; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 80) * (CHUNK_SIZE - STONE_W));
        const ey = y0 + Math.floor(scatterHash(i, salt + 81) * (CHUNK_SIZE - STONE_H));
        if ((ex-spawnPos.x)*(ex-spawnPos.x) + (ey-spawnPos.y)*(ey-spawnPos.y) < 40*40) continue;
        if (overlapsAnyShaft(ex, ey, STONE_W, STONE_H)) continue;
        if (isMountain(ex + STONE_W/2, ey + STONE_H/2)) continue;
        if (getBiome(ex + STONE_W/2, ey + STONE_H/2) === 'ocean') continue;
        chunk.stones.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
      for (let i = 0; i < 2; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 70) * (CHUNK_SIZE - COW_W));
        const ey = y0 + Math.floor(scatterHash(i, salt + 71) * (CHUNK_SIZE - COW_H));
        if ((ex-spawnPos.x)*(ex-spawnPos.x) + (ey-spawnPos.y)*(ey-spawnPos.y) < 40*40) continue;
        if (overlapsAnyShaft(ex, ey, COW_W, COW_H)) continue;
        if (isMountain(ex + COW_W/2, ey + COW_H/2)) continue;
        if (getBiome(ex + COW_W/2, ey + COW_H/2) === 'ocean') continue;
        chunk.cows.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
    } else if (biome === 'mountain') {
      for (let i = 0; i < 4; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 50) * (CHUNK_SIZE - ORE_W));
        const ey = y0 + Math.floor(scatterHash(i, salt + 51) * (CHUNK_SIZE - ORE_H));
        if ((ex-spawnPos.x)*(ex-spawnPos.x) + (ey-spawnPos.y)*(ey-spawnPos.y) < 40*40) continue;
        if (overlapsAnyShaft(ex, ey, ORE_W, ORE_H)) continue;
        if (!isMountain(ex, ey) || !isMountain(ex + ORE_W, ey) || !isMountain(ex, ey + ORE_H) || !isMountain(ex + ORE_W, ey + ORE_H)) continue;
        if (getBiome(ex, ey) === 'ocean') continue;
        chunk.ores.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
      for (let i = 0; i < 2; i++) {
        const ex = x0 + Math.floor(scatterHash(i, salt + 60) * (CHUNK_SIZE - SHEEP_W));
        const ey = y0 + Math.floor(scatterHash(i, salt + 61) * (CHUNK_SIZE - SHEEP_H));
        if ((ex-spawnPos.x)*(ex-spawnPos.x) + (ey-spawnPos.y)*(ey-spawnPos.y) < 40*40) continue;
        if (overlapsAnyShaft(ex, ey, SHEEP_W, SHEEP_H)) continue;
        if (getBiome(ex + SHEEP_W/2, ey + SHEEP_H/2) === 'ocean') continue;
        chunk.sheep.push({ x: ex, y: ey, _cx: cx, _cy: cy });
      }
    }

    chunks.set(key, chunk);
    return chunk;
  }

  function updateChunks() {
    const pcx = Math.floor(player.x / CHUNK_SIZE);
    const pcy = Math.floor(player.y / CHUNK_SIZE);
    if (pcx === lastPlayerChunkX && pcy === lastPlayerChunkY) return false;
    lastPlayerChunkX = pcx;
    lastPlayerChunkY = pcy;

    // Unload distant chunks (keep modified ones)
    for (const [key, chunk] of chunks) {
      const dx = Math.abs(chunk.cx - pcx);
      const dy = Math.abs(chunk.cy - pcy);
      if (dx > LOAD_RADIUS + 1 || dy > LOAD_RADIUS + 1) {
        if (!chunk.modified) chunks.delete(key);
      }
    }

    // Load nearby chunks and check for mineshafts
    for (let dy = -LOAD_RADIUS; dy <= LOAD_RADIUS; dy++) {
      for (let dx = -LOAD_RADIUS; dx <= LOAD_RADIUS; dx++) {
        checkMineshaftForChunk(pcx + dx, pcy + dy);
        generateChunk(pcx + dx, pcy + dy);
      }
    }

    rebuildActiveEntities();
    return true;
  }

  function rebuildActiveEntities() {
    trees = [];
    pigs = [];
    sheep = [];
    cows = [];
    stones = [];
    ores = [];
    gold_ores = [];
    diamond_ores = [];
    obsidian_ores = [];
    coal_ores = [];
    for (const chunk of chunks.values()) {
      trees.push(...chunk.trees);
      pigs.push(...chunk.pigs);
      sheep.push(...chunk.sheep);
      cows.push(...chunk.cows);
      stones.push(...chunk.stones);
      ores.push(...chunk.ores);
      gold_ores.push(...chunk.gold_ores);
      diamond_ores.push(...chunk.diamond_ores);
      obsidian_ores.push(...chunk.obsidian_ores);
      coal_ores.push(...chunk.coal_ores);
    }
  }

  function removeFromChunk(entity, type) {
    const key = chunkKey(entity._cx, entity._cy);
    const chunk = chunks.get(key);
    if (!chunk) return;
    const arr = chunk[type];
    const idx = arr.indexOf(entity);
    if (idx >= 0) {
      arr.splice(idx, 1);
      chunk.modified = true;
    }
  }

  function addToChunk(entity, type) {
    const cx = Math.floor(entity.x / CHUNK_SIZE);
    const cy = Math.floor(entity.y / CHUNK_SIZE);
    entity._cx = cx;
    entity._cy = cy;
    const key = chunkKey(cx, cy);
    const chunk = chunks.get(key);
    if (chunk) {
      chunk[type].push(entity);
      chunk.modified = true;
    }
  }

  const TRUNK_W = 4;
  const TRUNK_H = 6;
  const LEAVES_W = 14;
  const LEAVES_H = 10;

  const TREE_LEAVES = [
    '..XXXXXXXXXX..',
    '.XHHLLLLLLLLX.',
    'XHHHLLLLLLLLLX',
    'XHHLLLLLLLLLLX',
    'XLLLLLLLLLLLLX',
    'XLLLLLLLLLLLLX',
    'XLLLLLLLLLSSSX',
    'XLLLLLLLLSSSSX',
    '.XLLLLLLLSSSX.',
    '..XXXXXXXXXX..',
  ];
  const TREE_TRUNK = [
    'TTKK',
    'TTKK',
    'TTKK',
    'TTKK',
    'TTKK',
    'TTKK',
  ];
  const TREE_COLORS = {
    X: '#1f4a1f',
    L: '#3aa63a',
    H: '#5fd95f',
    S: '#2e6e2e',
    T: '#6b3d1a',
    K: '#3e2410',
  };

  function drawSprite(sprite, px, py, palette) {
    for (let r = 0; r < sprite.length; r++) {
      const line = sprite[r];
      for (let c = 0; c < line.length; c++) {
        const ch = line[c];
        if (ch === '.') continue;
        ctx.fillStyle = palette[ch];
        ctx.fillRect(px + c, py + r, 1, 1);
      }
    }
  }

  function drawMountains(wx0, wy0, wx1, wy1) {
    const tile = 2;
    const x0 = Math.floor(wx0 / tile) * tile;
    const y0 = Math.floor(wy0 / tile) * tile;
    for (let y = y0; y < wy1; y += tile) {
      for (let x = x0; x < wx1; x += tile) {
        if (!isMountain(x, y)) continue;
        const bn = biomeNoise(x, y);
        const jag = edgeNoise(x, y);
        // Depth: how far into the mountain (0 = edge, 1 = deep)
        const rawDepth = (bn + jag - 0.72) / 0.28;
        const depth = Math.min(1, Math.max(0, rawDepth));
        const variation = rand(x * 0.5 + 11, y * 0.5 + 17);
        const v2 = rand(x * 0.3 + 31, y * 0.3 + 53);
        // Per-pixel jitter for craggy look
        const jitter = rand(x + 3, y + 7) * 0.15;
        const d = Math.min(1, Math.max(0, depth + jitter - 0.05));
        let c;
        if (d < 0.1) {
          // Edge — light rocky outcrops, very jagged
          c = variation < 0.25 ? '#a2a2ac' : variation < 0.6 ? '#8a8a94' : '#b4b4bc';
        } else if (d < 0.25) {
          c = variation < 0.3 ? '#7a7a84' : variation < 0.65 ? '#6a6a74' : '#8a8a92';
        } else if (d < 0.45) {
          // Mid — rocky surface with directional lighting
          const lightSide = (x % 5 < 2) ? 0.1 : -0.06;
          if (variation < 0.3 + lightSide) c = '#4a4a54';
          else if (variation < 0.65) c = '#5a5a64';
          else c = '#6a6a72';
        } else if (d < 0.7) {
          // Deep — craggy with cracks
          const crackV = rand(x * 0.7 + 7, y * 0.7 + 3);
          if (crackV < 0.14) {
            c = '#16161c';
          } else if (variation < 0.25) {
            c = '#22222a';
          } else if (variation < 0.55) {
            c = '#2e2e36';
          } else if (variation < 0.8) {
            c = '#3a3a42';
          } else {
            c = '#4e4e58';
          }
        } else {
          // Deepest — dark crevices with occasional highlights
          const crackV = rand(x * 0.7 + 7, y * 0.7 + 3);
          if (crackV < 0.2) {
            c = '#0a0a10';
          } else if (v2 < 0.12) {
            c = '#3e3e48';
          } else if (variation < 0.4) {
            c = '#18181e';
          } else if (variation < 0.7) {
            c = '#24242c';
          } else {
            c = '#2e2e36';
          }
        }
        ctx.fillStyle = c;
        ctx.fillRect(x, y, tile, tile);
      }
    }
  }

  // Mineshaft system — multiple shafts can exist
  const BRIDGE_W = 32;
  const BRIDGE_H = 56;
  const RAVINE_W = 44;
  const RAVINE_H = BRIDGE_H;

  // All known mineshafts: { x, y, bridgeSlots, bridgeFixed }
  // x,y is top-left of the shaft entrance
  const mineshafts = [];
  const generatedMineshaftChunks = new Set();

  // Deterministically check if a mountain chunk should have a mineshaft
  function checkMineshaftForChunk(cx, cy) {
    const key = chunkKey(cx, cy);
    if (generatedMineshaftChunks.has(key)) return;
    generatedMineshaftChunks.add(key);
    const x0 = cx * CHUNK_SIZE;
    const y0 = cy * CHUNK_SIZE;
    const centerX = x0 + CHUNK_SIZE / 2;
    const centerY = y0 + CHUNK_SIZE / 2;
    if (!isMountain(centerX, centerY)) return;
    // Must be near a mountain edge — at least one neighboring chunk-sized offset is NOT mountain
    let nearEdge = false;
    for (const [ndx, ndy] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      if (!isMountain(centerX + ndx * CHUNK_SIZE, centerY + ndy * CHUNK_SIZE)) { nearEdge = true; break; }
    }
    if (!nearEdge) return;
    // ~20% chance per qualifying mountain-edge chunk
    const h = scatterHash(cx * 3571 + cy * 2399, 7777);
    if (h > 0.20) return;
    // Must be far from any existing mineshaft (prevent clustering in same range)
    const sx = Math.floor(centerX - BRIDGE_W / 2);
    const sy = Math.floor(centerY - BRIDGE_H / 2);
    const MIN_SHAFT_DIST = 800;
    for (const ms of mineshafts) {
      const ddx = sx - ms.x, ddy = sy - ms.y;
      if (ddx * ddx + ddy * ddy < MIN_SHAFT_DIST * MIN_SHAFT_DIST) return;
    }
    // Don't spawn shafts on lava
    if (isLavaTile(centerX, centerY)) return;
    mineshafts.push({ x: sx, y: sy, bridgeSlots: new Array(5).fill(null), bridgeFixed: false });
  }

  // Get the ravine rect for a mineshaft
  function shaftRavineRect(ms) {
    return { x: ms.x - Math.floor((RAVINE_W - BRIDGE_W) / 2), y: ms.y, w: RAVINE_W, h: RAVINE_H };
  }

  // Currently interacted shaft (set when player opens bridge UI)
  let activeShaft = null;

  // Cave / shaft transition system
  const CAVE_OFFSET = 50000;
  let shaftTransitionPhase = 'none'; // 'fadeOut', 'black', 'fadeIn', 'none'
  let shaftTransitionTimer = 0;
  let shaftTargetX = 0, shaftTargetY = 0;

  // Helper: check if a point overlaps any mineshaft ravine
  function overlapsAnyShaft(ex, ey, ew, eh) {
    for (const ms of mineshafts) {
      const r = shaftRavineRect(ms);
      if (ex + ew > r.x && ex < r.x + r.w && ey + eh > r.y && ey < r.y + r.h) return true;
    }
    return false;
  }

  function drawRavine(ms) {
    const rx = ms.x - Math.floor((RAVINE_W - BRIDGE_W) / 2);
    const ry = ms.y;
    // Dark tunnel interior
    for (let py = 0; py < RAVINE_H; py++) {
      for (let px = 0; px < RAVINE_W; px++) {
        const edgeDist = Math.min(px, RAVINE_W - 1 - px);
        const depthDist = py; // deeper = darker towards top
        const r = rand(rx + px, ry + py + 200);
        let c;
        if (edgeDist <= 1) {
          c = r < 0.4 ? '#1e1e24' : '#2a2a30';
        } else if (edgeDist <= 3) {
          c = r < 0.3 ? '#14141a' : r < 0.6 ? '#1a1a20' : '#222228';
        } else {
          // Deep mine darkness — darker towards the top (deeper in)
          const dd = Math.max(0, 1 - depthDist / 30);
          if (r < 0.3) c = dd > 0.5 ? '#060608' : '#0a0a10';
          else if (r < 0.7) c = dd > 0.5 ? '#08080c' : '#0e0e14';
          else c = dd > 0.5 ? '#0c0c12' : '#141418';
        }
        ctx.fillStyle = c;
        ctx.fillRect(rx + px, ry + py, 1, 1);
      }
    }
    // Jagged rock edges
    for (let py = 0; py < RAVINE_H; py++) {
      const wobbleL = Math.floor(rand(py * 3, 500) * 3);
      const wobbleR = Math.floor(rand(py * 3, 600) * 3);
      for (let d = 0; d < wobbleL; d++) {
        const r = rand(rx - 1 - d, ry + py + 300);
        ctx.fillStyle = r < 0.5 ? '#1e1e24' : '#2a2a30';
        ctx.fillRect(rx - 1 - d, ry + py, 1, 1);
      }
      for (let d = 0; d < wobbleR; d++) {
        const r = rand(rx + RAVINE_W + d, ry + py + 300);
        ctx.fillStyle = r < 0.5 ? '#1e1e24' : '#2a2a30';
        ctx.fillRect(rx + RAVINE_W + d, ry + py, 1, 1);
      }
    }
  }

  function drawBridge(ms) {
    const x0 = ms.x;
    const y0 = ms.y;
    const bridgeFixed = ms.bridgeFixed;
    const bw = BRIDGE_W;
    const iw = bw - 4; // inner width

    // Colors
    const cBeam     = '#5a3418';
    const cBeamDk   = '#3a1a08';
    const cBeamLt   = '#6b3d1a';
    const cPlank    = '#6b3d1a';
    const cPlankDk  = '#4a2810';
    const cPlankLt  = '#7a4e2a';
    const cNail     = '#3a3a42';
    const cRail     = '#5a5a64';
    const cRailLt   = '#7a7a84';
    const cMoss     = '#3a6a2a';
    const cRust     = '#8a4a2a';
    const cRustDk   = '#5a3018';
    const cIron     = '#6a6a72';
    const cIronLt   = '#8a8a92';
    const cIronDk   = '#4a4a52';
    const cWheelDk  = '#3a3a42';
    const cWheelLt  = '#5a5a62';
    const cWood     = '#6b3d1a';
    const cWoodDk   = '#4a2810';

    // --- Timber entrance frame (arch at the top of the tunnel) ---
    // Two thick vertical beams on each side
    for (let py = 0; py < 6; py++) {
      // Left beam
      ctx.fillStyle = cBeamDk;
      ctx.fillRect(x0, y0 + py, 1, 1);
      ctx.fillStyle = cBeam;
      ctx.fillRect(x0 + 1, y0 + py, 2, 1);
      ctx.fillStyle = cBeamLt;
      ctx.fillRect(x0 + 3, y0 + py, 1, 1);
      // Right beam
      ctx.fillStyle = cBeamLt;
      ctx.fillRect(x0 + bw - 4, y0 + py, 1, 1);
      ctx.fillStyle = cBeam;
      ctx.fillRect(x0 + bw - 3, y0 + py, 2, 1);
      ctx.fillStyle = cBeamDk;
      ctx.fillRect(x0 + bw - 1, y0 + py, 1, 1);
    }
    // Horizontal header beam across top
    ctx.fillStyle = cBeamDk;
    ctx.fillRect(x0, y0 + 6, bw, 1);
    ctx.fillStyle = cBeam;
    ctx.fillRect(x0, y0 + 7, bw, 1);
    ctx.fillStyle = cBeamLt;
    ctx.fillRect(x0, y0 + 8, bw, 1);
    ctx.fillStyle = cBeamDk;
    ctx.fillRect(x0, y0 + 9, bw, 1);
    // Nails on header
    ctx.fillStyle = cNail;
    ctx.fillRect(x0 + 2, y0 + 7, 1, 1);
    ctx.fillRect(x0 + bw - 3, y0 + 7, 1, 1);
    // Moss on frame
    ctx.fillStyle = cMoss;
    ctx.fillRect(x0 + 1, y0 + 1, 1, 1);
    ctx.fillRect(x0 + bw - 2, y0 + 3, 1, 1);
    ctx.fillRect(x0 + 5, y0 + 6, 1, 1);

    // --- Rail tracks running into the mine (rows 10 onward) ---
    const trackL = x0 + 6;   // left rail x
    const trackR = x0 + bw - 8; // right rail x
    const trackEnd = bridgeFixed ? BRIDGE_H : 19;
    // Wooden sleepers (ties) across the tracks
    for (let py = 10; py < BRIDGE_H; py++) {
      const gy = y0 + py;
      if (py % 4 === 0) {
        // Sleeper
        ctx.fillStyle = cPlankDk;
        ctx.fillRect(trackL - 2, gy, trackR - trackL + 6, 1);
        ctx.fillStyle = cNail;
        ctx.fillRect(trackL, gy, 1, 1);
        ctx.fillRect(trackR + 2, gy, 1, 1);
      }
    }
    // Metal rails
    for (let py = 10; py < BRIDGE_H; py++) {
      const gy = y0 + py;
      if (py < trackEnd || py >= 46) {
        ctx.fillStyle = cIronDk;
        ctx.fillRect(trackL, gy, 1, 1);
        ctx.fillRect(trackR + 2, gy, 1, 1);
        ctx.fillStyle = cIronLt;
        ctx.fillRect(trackL + 1, gy, 1, 1);
        ctx.fillRect(trackR + 3, gy, 1, 1);
      } else if (!bridgeFixed) {
        // Broken rails in the gap — bent/missing segments
        if (py < 22) {
          ctx.fillStyle = cRust;
          ctx.fillRect(trackL, gy, 1, 1);
          if (py < 21) { ctx.fillStyle = cRustDk; ctx.fillRect(trackR + 2, gy, 1, 1); }
        }
        if (py > 42) {
          ctx.fillStyle = cRust;
          ctx.fillRect(trackR + 3, gy, 1, 1);
          if (py > 43) { ctx.fillStyle = cRustDk; ctx.fillRect(trackL + 1, gy, 1, 1); }
        }
      }
    }

    // --- Support beams along the shaft walls ---
    for (let py = 10; py < BRIDGE_H; py += 12) {
      const gy = y0 + py;
      // Left wall beam
      ctx.fillStyle = cBeamDk;
      ctx.fillRect(x0, gy, 1, 1);
      ctx.fillRect(x0, gy + 1, 1, 1);
      ctx.fillStyle = cBeam;
      ctx.fillRect(x0 + 1, gy, 2, 1);
      ctx.fillRect(x0 + 1, gy + 1, 2, 1);
      // Right wall beam
      ctx.fillStyle = cBeam;
      ctx.fillRect(x0 + bw - 3, gy, 2, 1);
      ctx.fillRect(x0 + bw - 3, gy + 1, 2, 1);
      ctx.fillStyle = cBeamDk;
      ctx.fillRect(x0 + bw - 1, gy, 1, 1);
      ctx.fillRect(x0 + bw - 1, gy + 1, 1, 1);
      // Cross beam
      ctx.fillStyle = cBeam;
      ctx.fillRect(x0, gy + 2, bw, 1);
      ctx.fillStyle = cNail;
      ctx.fillRect(x0 + 2, gy + 2, 1, 1);
      ctx.fillRect(x0 + bw - 3, gy + 2, 1, 1);
    }

    // --- Collapsed rubble in the gap (when not fixed) ---
    if (!bridgeFixed) {
      const gy0 = y0 + 22;
      // Fallen rocks and debris
      for (let i = 0; i < 15; i++) {
        const rx = x0 + 4 + Math.floor(rand(i, 777) * (bw - 8));
        const ry = gy0 + Math.floor(rand(i, 888) * 18);
        const r = rand(i + 10, 999);
        ctx.fillStyle = r < 0.3 ? '#3a3a42' : r < 0.6 ? '#4a4a52' : '#2a2a30';
        ctx.fillRect(rx, ry, 1 + Math.floor(r * 2), 1);
      }
      // Broken beam across the rubble
      ctx.fillStyle = cBeamDk;
      ctx.fillRect(x0 + 3, y0 + 28, 10, 1);
      ctx.fillStyle = cBeam;
      ctx.fillRect(x0 + 4, y0 + 29, 8, 1);
      // Another fallen beam
      ctx.fillStyle = cBeamDk;
      ctx.fillRect(x0 + 15, y0 + 35, 12, 1);
    }

    if (bridgeFixed) {
      // Fixed gap section — new timber and intact rails already drawn above
      for (let py = 19; py < 46; py += 12) {
        const gy = y0 + py;
        // Fresh support beams
        ctx.fillStyle = cPlankLt;
        ctx.fillRect(x0, gy, 1, 1); ctx.fillRect(x0, gy + 1, 1, 1);
        ctx.fillStyle = cPlank;
        ctx.fillRect(x0 + 1, gy, 2, 1); ctx.fillRect(x0 + 1, gy + 1, 2, 1);
        ctx.fillRect(x0 + bw - 3, gy, 2, 1); ctx.fillRect(x0 + bw - 3, gy + 1, 2, 1);
        ctx.fillStyle = cPlankLt;
        ctx.fillRect(x0 + bw - 1, gy, 1, 1); ctx.fillRect(x0 + bw - 1, gy + 1, 1, 1);
        ctx.fillStyle = cPlank;
        ctx.fillRect(x0, gy + 2, bw, 1);
      }
    }

    // --- Minecart near the entrance ---
    const cartX = x0 + Math.floor(bw / 2) - 6;
    const cartY = y0 + BRIDGE_H - 10;

    if (bridgeFixed) {
      // Repaired minecart — clean, intact
      // Cart body
      ctx.fillStyle = cIron;
      ctx.fillRect(cartX, cartY, 12, 1);
      ctx.fillRect(cartX - 1, cartY + 1, 14, 1);
      ctx.fillRect(cartX - 1, cartY + 2, 14, 1);
      ctx.fillRect(cartX - 1, cartY + 3, 14, 1);
      ctx.fillStyle = cIronLt;
      ctx.fillRect(cartX, cartY + 1, 12, 1);
      ctx.fillRect(cartX, cartY + 2, 12, 1);
      ctx.fillStyle = cIronDk;
      ctx.fillRect(cartX - 1, cartY + 4, 14, 1);
      // Wheels
      ctx.fillStyle = cWheelDk;
      ctx.fillRect(cartX, cartY + 5, 3, 2);
      ctx.fillRect(cartX + 9, cartY + 5, 3, 2);
      ctx.fillStyle = cWheelLt;
      ctx.fillRect(cartX + 1, cartY + 5, 1, 1);
      ctx.fillRect(cartX + 10, cartY + 5, 1, 1);
      // Axle
      ctx.fillStyle = cIronDk;
      ctx.fillRect(cartX + 3, cartY + 6, 6, 1);
    } else {
      // Tattered minecart — rusted, tilted, broken
      // Tilted body (right side lower)
      ctx.fillStyle = cRust;
      ctx.fillRect(cartX + 1, cartY, 10, 1);
      ctx.fillStyle = cRustDk;
      ctx.fillRect(cartX, cartY + 1, 11, 1);
      ctx.fillStyle = cRust;
      ctx.fillRect(cartX, cartY + 2, 12, 1);
      ctx.fillStyle = cRustDk;
      ctx.fillRect(cartX - 1, cartY + 3, 13, 1);
      // Dents and holes
      ctx.fillStyle = '#2a1a10';
      ctx.fillRect(cartX + 3, cartY + 2, 1, 1);
      ctx.fillRect(cartX + 7, cartY + 1, 2, 1);
      // Bent rim
      ctx.fillStyle = cRustDk;
      ctx.fillRect(cartX - 1, cartY + 4, 14, 1);
      ctx.fillRect(cartX + 12, cartY + 3, 1, 1);
      // Broken left wheel (off axle)
      ctx.fillStyle = cWheelDk;
      ctx.fillRect(cartX - 2, cartY + 5, 2, 2);
      ctx.fillStyle = cWheelLt;
      ctx.fillRect(cartX - 1, cartY + 5, 1, 1);
      // Right wheel (still attached but rusted)
      ctx.fillStyle = cWheelDk;
      ctx.fillRect(cartX + 9, cartY + 5, 3, 2);
      ctx.fillStyle = cRust;
      ctx.fillRect(cartX + 10, cartY + 5, 1, 1);
      // Bent axle
      ctx.fillStyle = cRustDk;
      ctx.fillRect(cartX + 1, cartY + 6, 8, 1);
      ctx.fillRect(cartX + 1, cartY + 7, 2, 1);
      // Scattered ore/debris near cart

      ctx.fillRect(cartX + 13, cartY + 5, 1, 1);
      ctx.fillRect(cartX + 14, cartY + 4, 1, 1);
      ctx.fillStyle = cRustDk;
      ctx.fillRect(cartX - 3, cartY + 6, 1, 1);
    }
  }

  function inventorySlotsFree() {
    let c = 0;
    for (const s of hotbar) if (s === null) c++;
    for (const s of inventory) if (s === null) c++;
    return c;
  }

  function spawnDeathTombstone() {
    const items = [];
    for (let i = 0; i < hotbar.length; i++) {
      if (hotbar[i] !== null) { items.push(hotbar[i]); hotbar[i] = null; }
    }
    for (let i = 0; i < inventory.length; i++) {
      if (inventory[i] !== null) { items.push(inventory[i]); inventory[i] = null; }
    }
    // Drop equipped armor too
    if (armorSlot !== null) {
      items.push(armorSlot);
      armorSlot = null;
      armorHP = 0;
      goldArmorHP = 0;
      diamondArmorHP = 0;
    }
    if (items.length > 0) {
      deathTombstones.push({
        x: Math.round(player.x + player.w / 2 - GRAVE_W / 2),
        y: Math.round(player.y + player.h - GRAVE_H),
        items,
      });
    }
  }

  function lootTombstone(dt) {
    let i = 0;
    while (i < dt.items.length) {
      if (inventorySlotsFree() <= 0) break;
      addToInventory(dt.items[i]);
      dt.items.splice(i, 1);
    }
    return dt.items.length === 0;
  }

  function drawObsidianPortalWorld(px, py, activated) {
    const t = performance.now() * 0.002;
    // Dark obsidian frame
    const frameC = '#0a0a14';
    const frameC2 = '#1a1020';
    ctx.fillStyle = frameC;
    ctx.fillRect(px, py, 12, 2);
    ctx.fillRect(px, py + 10, 12, 2);
    ctx.fillRect(px, py, 2, 12);
    ctx.fillRect(px + 10, py, 2, 12);
    ctx.fillStyle = frameC2;
    ctx.fillRect(px + 1, py + 1, 10, 1);
    ctx.fillRect(px + 1, py + 10, 10, 1);
    ctx.fillRect(px + 1, py + 1, 1, 10);
    ctx.fillRect(px + 10, py + 1, 1, 10);
    // Center — swirling if activated, dark and dormant if not
    for (let iy = 2; iy < 10; iy++) {
      for (let ix = 2; ix < 10; ix++) {
        if (activated) {
          const cx = ix - 6, cy = iy - 6;
          const angle = Math.atan2(cy, cx) + t;
          const dist = Math.sqrt(cx*cx + cy*cy);
          const swirl = Math.sin(angle * 3 + dist * 0.8 + t * 2);
          const swirl2 = Math.cos(angle * 2 - t * 1.5 + dist);
          let r, g, b;
          if (swirl > 0.3) {
            r = 80 + Math.floor(swirl * 40); g = 20; b = 120 + Math.floor(swirl * 60);
          } else if (swirl2 > 0.2) {
            r = 50 + Math.floor(swirl2 * 30); g = 10; b = 80 + Math.floor(swirl2 * 50);
          } else {
            r = 20 + Math.floor(Math.abs(swirl) * 20); g = 5; b = 40 + Math.floor(Math.abs(swirl) * 30);
          }
          ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
        } else {
          // Deactivated — dark, lifeless center
          const rv = rand(px + ix, py + iy);
          ctx.fillStyle = rv < 0.3 ? '#0a0a10' : rv < 0.6 ? '#0e0e16' : '#12121c';
        }
        ctx.fillRect(px + ix, py + iy, 1, 1);
      }
    }
  }

  function queueRespawn(type, pos, time) {

  function updateRespawns(dt) {
    let changed = false;
    for (let i = respawnQueue.length - 1; i >= 0; i--) {
      respawnQueue[i].timer -= dt;
      if (respawnQueue[i].timer <= 0) {
        const r = respawnQueue[i];
        const entity = { x: r.pos.x, y: r.pos.y };
        let type;
        if (r.type === 'tree') type = 'trees';
        else if (r.type === 'stone') type = 'stones';
        else if (r.type === 'ore') type = 'ores';
        else if (r.type === 'gold_ore') type = 'gold_ores';
        else if (r.type === 'diamond_ore') type = 'diamond_ores';
        else if (r.type === 'obsidian_ore') type = 'obsidian_ores';
        else if (r.type === 'coal_ore') type = 'coal_ores';
        else if (r.type === 'pig') type = 'pigs';
        else if (r.type === 'cow') type = 'cows';
        else if (r.type === 'sheep') type = 'sheep';
        if (type) {
          addToChunk(entity, type);
          changed = true;
        }
        respawnQueue.splice(i, 1);
      }
    }
    if (changed) rebuildActiveEntities();
  }

  function addToInventory(item) {
    for (let i = 0; i < hotbar.length; i++) {
      if (hotbar[i] === null) { hotbar[i] = item; return; }
    }
    for (let i = 0; i < inventory.length; i++) {
      if (inventory[i] === null) { inventory[i] = item; return; }
    }
  }

  function removeItems(item, count) {
    let removed = 0;
    for (let i = 0; i < hotbar.length && removed < count; i++) {
      if (hotbar[i] === item) { hotbar[i] = null; removed++; }
    }
    for (let i = 0; i < inventory.length && removed < count; i++) {
      if (inventory[i] === item) { inventory[i] = null; removed++; }
    }
    return removed;
  }

  function collidesWall(bx, by, bw, bh) {
    for (const pl of planks) {
      const r = plankRect(pl);
      if (bx < r.x + r.w && bx + bw > r.x && by < r.y + r.h && by + bh > r.y) return true;

    for (const sb of stoneBricks) {
      const r = stoneBrickRect(sb);
      if (bx < r.x + r.w && bx + bw > r.x && by < r.y + r.h && by + bh > r.y) return true;
    }
    return false;
  }

    '.': ['...','...','...','...','.X.'],

    ']': ['.XX','..X','..X','..X','.XX'],
    '<': ['..X','.X.','X..','.X.','..X'],
    '>': ['X..','.X.','..X','.X.','X..'],
    'Z': ['XXX','..X','.X.','X..','XXX'],
    '_': ['...','...','...','...','XXX'],
  };
  const GLYPH_W = 3, GLYPH_H = 5, GLYPH_GAP = 1;

  function drawText(text, cx, cy, color) {
    ctx.fillStyle = color;
    const upper = text.toUpperCase();
    const totalW = upper.length * GLYPH_W + (upper.length - 1) * GLYPH_GAP;
    let x = Math.round(cx - totalW / 2);
    const y = Math.round(cy - GLYPH_H / 2);
    for (const ch of upper) {
      const g = FONT[ch];
      if (g) {
        for (let r = 0; r < GLYPH_H; r++) {
          const line = g[r];
          for (let c = 0; c < GLYPH_W; c++) {
            if (line[c] === 'X') ctx.fillRect(x + c, y + r, 1, 1);
          }
        }
      }
      x += GLYPH_W + GLYPH_GAP;
    }
  }

  // Draw text at 2x pixel scale for titles
  function drawBigText(text, cx, cy, color, scale) {
    scale = scale || 2;
    ctx.fillStyle = color;
    const upper = text.toUpperCase();
    const charW = GLYPH_W * scale;
    const charGap = GLYPH_GAP * scale;
    const totalW = upper.length * charW + (upper.length - 1) * charGap;
    let x = Math.round(cx - totalW / 2);
    const y = Math.round(cy - (GLYPH_H * scale) / 2);
    for (const ch of upper) {
      const g = FONT[ch];
      if (g) {
        for (let r = 0; r < GLYPH_H; r++) {
          const line = g[r];
          for (let c = 0; c < GLYPH_W; c++) {
            if (line[c] === 'X') ctx.fillRect(x + c * scale, y + r * scale, scale, scale);
          }
        }
      }
      x += charW + charGap;
    }
  }

  // Draw a button rectangle and return its bounds for click testing
  function drawButton(text, cx, cy, w, h, bgColor, textColor, hoverBg) {
    const bx = Math.floor(cx - w / 2);
    const by = Math.floor(cy - h / 2);
    // Check hover
    const hovered = mouseCanvasX >= bx && mouseCanvasX < bx + w &&
                    mouseCanvasY >= by && mouseCanvasY < by + h;
    ctx.fillStyle = hovered && hoverBg ? hoverBg : bgColor;
    ctx.fillRect(bx, by, w, h);
    // Border
    ctx.fillStyle = '#555';
    ctx.fillRect(bx, by, w, 1);
    ctx.fillRect(bx, by, 1, h);
    ctx.fillStyle = '#222';
    ctx.fillRect(bx, by + h - 1, w, 1);
    ctx.fillRect(bx + w - 1, by, 1, h);
    drawText(text, cx, cy, textColor);
    return { x: bx, y: by, w, h };
  }

  function clickInRect(sx, sy, r) {
    return sx >= r.x && sx < r.x + r.w && sy >= r.y && sy < r.y + r.h;
  }
